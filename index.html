<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoanOffice — Hệ thống điều hành văn bản Đoàn TNCS Hồ Chí Minh</title>
<meta name="theme-color" content="#0A4A85">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --doan:#0E5FA8; --doan-2:#1B75C4; --doan-deep:#0A4A85; --doan-ink:#072B4E;
  --gold:#F0B429; --gold-2:#DE9A0B; --gold-soft:#FDF0D5;
  --paper:#EEF3F9; --card:#FFFFFF; --ink:#16283A; --muted:#5F7488;
  --line:#D9E3EF; --line-soft:#EAF0F8;
  --ok:#128A50; --ok-bg:#E2F6EC; --warn:#B96A00; --warn-bg:#FDF1DC;
  --danger:#CC3A3A; --danger-bg:#FCE9E9; --info-bg:#E9F2FC;
  --r:14px; --r-sm:10px;
  --shadow:0 1px 2px rgba(10,58,105,.05),0 6px 20px -6px rgba(10,58,105,.10);
  --shadow-lg:0 4px 10px rgba(7,43,78,.07),0 20px 44px -14px rgba(7,43,78,.22);
  --ring:0 0 0 3px rgba(27,117,196,.22);
  --ease:cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:"Be Vietnam Pro","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button{font:inherit;cursor:pointer}
input,select,textarea{font:inherit;color:var(--ink)}
a{color:var(--doan);text-decoration:none}
a:hover{text-decoration:underline}
::selection{background:rgba(240,180,41,.35)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C3D2E2;border-radius:99px;border:2px solid var(--paper)}
::-webkit-scrollbar-thumb:hover{background:#A9BDD2}

/* ---------- Generic form controls ---------- */
input[type=text],input[type=password],input[type=date],input[type=number],input:not([type]),select,textarea{
  transition:border-color .16s var(--ease),box-shadow .16s var(--ease),background .16s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--doan-2)!important;box-shadow:var(--ring);background:#fff}
input::placeholder,textarea::placeholder{color:#9AACBE}
select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='%235F7488' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round' d='M1.5 1.8 6 6.2l4.5-4.4'/></svg>");background-repeat:no-repeat;background-position:right 11px center;padding-right:30px!important;background-color:#FBFDFF}
input[type=checkbox]{accent-color:var(--doan);width:16px;height:16px;cursor:pointer}
input[type=file]{padding:8px;border:1.5px dashed var(--line);border-radius:10px;background:#FAFCFF;width:100%;font-size:.84rem;color:var(--muted);cursor:pointer;transition:border-color .16s,background .16s}
input[type=file]:hover{border-color:var(--doan-2);background:var(--info-bg)}
input[type=file]::file-selector-button{border:none;background:var(--doan);color:#fff;font-weight:600;font-size:.8rem;padding:6px 13px;border-radius:8px;margin-right:10px;cursor:pointer;font-family:inherit}

/* ---------- Login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(1100px 620px at 82% -10%,rgba(27,117,196,.55),transparent 60%),
             radial-gradient(900px 560px at -10% 110%,rgba(240,180,41,.20),transparent 55%),
             linear-gradient(152deg,var(--doan-ink) 0%,var(--doan-deep) 52%,var(--doan) 100%);
  position:relative;overflow:hidden}
.login-wrap::before{content:"";position:absolute;inset:0;opacity:.06;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120"><path fill="white" d="M60 18l9.6 22.9 24.8 2-18.9 16.2 5.7 24.2L60 70.4 38.8 83.3l5.7-24.2-18.9-16.2 24.8-2z"/></svg>');
  background-size:130px}
.login-wrap::after{content:"";position:absolute;left:50%;top:-260px;transform:translateX(-50%);width:820px;height:520px;border-radius:50%;background:radial-gradient(closest-side,rgba(255,255,255,.10),transparent);pointer-events:none}
.login-card{position:relative;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-radius:22px;
  box-shadow:0 30px 80px -18px rgba(2,18,36,.55),0 0 0 1px rgba(255,255,255,.35);
  width:min(430px,94vw);padding:38px 36px 30px;animation:cardIn .5s var(--ease)}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
.login-star{width:66px;height:66px;border-radius:20px;background:linear-gradient(140deg,var(--doan-2),var(--doan-ink));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 10px 24px -8px rgba(10,74,133,.55),inset 0 1px 0 rgba(255,255,255,.25)}
.login-card h1{font-size:1.45rem;text-align:center;color:var(--doan-ink);letter-spacing:-.02em;font-weight:800}
.login-card .sub{text-align:center;color:var(--muted);font-size:.85rem;margin:6px 0 24px;line-height:1.6}
.field{margin-bottom:15px}
.field label{display:block;font-size:.74rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:11px;background:#FBFDFF}
.field textarea{resize:vertical;min-height:42px;line-height:1.55}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:10px;padding:9px 17px;font-weight:600;font-size:.88rem;line-height:1.25;transition:transform .12s var(--ease),box-shadow .16s var(--ease),filter .16s,background .16s;white-space:nowrap;user-select:none}
.btn:hover{filter:brightness(1.06)}
.btn:active{transform:translateY(1px) scale(.985)}
.btn:focus-visible{outline:none;box-shadow:var(--ring)}
.btn-primary{background:linear-gradient(180deg,var(--doan-2),var(--doan));color:#fff;box-shadow:0 2px 6px -1px rgba(14,95,168,.45),inset 0 1px 0 rgba(255,255,255,.18)}
.btn-primary:hover{box-shadow:0 5px 14px -3px rgba(14,95,168,.55),inset 0 1px 0 rgba(255,255,255,.18)}
.btn-gold{background:linear-gradient(180deg,#F6C24A,var(--gold-2));color:#3D2B00;box-shadow:0 2px 6px -1px rgba(222,154,11,.5),inset 0 1px 0 rgba(255,255,255,.35)}
.btn-ghost{background:#fff;color:var(--doan-deep);border:1.5px solid var(--line);box-shadow:0 1px 2px rgba(10,58,105,.04)}
.btn-ghost:hover{background:var(--info-bg);border-color:#BFD4E8;filter:none}
.btn-ok{background:linear-gradient(180deg,#18A15F,var(--ok));color:#fff;box-shadow:0 2px 6px -1px rgba(18,138,80,.45)}
.btn-danger{background:linear-gradient(180deg,#DB4C4C,var(--danger));color:#fff;box-shadow:0 2px 6px -1px rgba(204,58,58,.4)}
.btn-sm{padding:5px 12px;font-size:.8rem;border-radius:8px}
.btn-block{width:100%;justify-content:center;padding:11px 17px;font-size:.95rem}
.demo-accounts{margin-top:22px;border-top:1px dashed var(--line);padding-top:15px}
.demo-accounts p{font-size:.76rem;color:var(--muted);margin-bottom:9px;line-height:1.55}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{border:1.5px solid var(--line);background:#fff;border-radius:99px;padding:5px 13px;font-size:.77rem;font-weight:600;color:var(--doan-deep);transition:all .15s var(--ease)}
.chip:hover{background:var(--doan);border-color:var(--doan);color:#fff;transform:translateY(-1px);box-shadow:0 4px 10px -3px rgba(14,95,168,.5)}
.login-err{background:var(--danger-bg);color:var(--danger);border:1px solid #F3C4C4;border-radius:10px;padding:9px 13px;font-size:.83rem;margin-bottom:13px;display:none}

/* ---------- Shell / Sidebar ---------- */
.shell{display:grid;grid-template-columns:258px 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,#0B4E8C 0%,var(--doan-ink) 78%);color:#fff;position:sticky;top:0;height:100vh;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;z-index:60;scrollbar-width:thin}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border:none}
.sidebar::after{content:"";position:fixed;bottom:-44px;left:38px;width:230px;height:230px;opacity:.06;pointer-events:none;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><path fill="white" d="M60 8l12.4 29.6 32 2.6-24.4 21 7.4 31.2L60 75.6 32.6 92.4 40 61.2 15.6 40.2l32-2.6z"/></svg>');
  background-size:contain;background-repeat:no-repeat}
.brand{display:flex;gap:12px;align-items:center;padding:20px 18px 18px;border-bottom:1px solid rgba(255,255,255,.10)}
.brand-star{width:42px;height:42px;flex:none;border-radius:13px;background:linear-gradient(140deg,#F6C24A,var(--gold-2));display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px -4px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.4)}
.brand b{font-size:1.06rem;letter-spacing:-.01em;display:block;line-height:1.2;font-weight:800}
.brand span{font-size:.66rem;opacity:.72;text-transform:uppercase;letter-spacing:.1em}
.nav{padding:12px 12px 8px;flex:1;position:relative;z-index:1}
.nav h6{font-size:.64rem;text-transform:uppercase;letter-spacing:.13em;opacity:.5;padding:14px 12px 6px;font-weight:700}
.nav a{display:flex;align-items:center;gap:11px;color:#DCE9F6;text-decoration:none;padding:9px 12px;border-radius:10px;font-size:.88rem;margin-bottom:2px;position:relative;transition:background .15s var(--ease),color .15s,transform .15s}
.nav a:hover{background:rgba(255,255,255,.08);text-decoration:none;transform:translateX(2px)}
.nav a.active{background:linear-gradient(120deg,#F6C24A,var(--gold));color:var(--doan-ink);font-weight:700;box-shadow:0 5px 14px -5px rgba(240,180,41,.6);transform:none}
.nav a.active .ico{color:var(--doan-ink);opacity:1}
.ico{width:19px;height:19px;display:inline-flex;align-items:center;justify-content:center;flex:none;opacity:.85}
.ico svg{width:17px;height:17px}
.badge{margin-left:auto;background:var(--danger);color:#fff;border-radius:99px;font-size:.67rem;font-weight:700;padding:1px 7px;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.nav a.active .badge{background:var(--doan-ink);color:var(--gold)}
.side-foot{padding:13px 18px;font-size:.67rem;opacity:.55;border-top:1px solid rgba(255,255,255,.1);position:relative;z-index:1;line-height:1.6}

/* ---------- Topbar / Main ---------- */
.main{display:flex;flex-direction:column;min-width:0}
.topbar{background:rgba(255,255,255,.86);backdrop-filter:blur(12px) saturate(1.4);border-bottom:1px solid var(--line);padding:10px 30px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50}
.topbar .unit{font-weight:700;color:var(--doan-ink);font-size:1rem;letter-spacing:-.01em;min-width:0}
.topbar .unit small{display:block;font-weight:500;color:var(--muted);font-size:.71rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .spacer{flex:1}
.userbox{display:flex;align-items:center;gap:9px;font-size:.85rem}
.avatar{width:34px;height:34px;flex:none;border-radius:11px;background:linear-gradient(140deg,var(--doan-2),var(--doan-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.84rem;box-shadow:0 3px 8px -2px rgba(10,74,133,.5)}
.menu-btn{display:none;background:#fff;border:1.5px solid var(--line);border-radius:10px;width:38px;height:38px;align-items:center;justify-content:center;color:var(--doan-deep);flex:none}
.sb-backdrop{display:none}
.content{padding:24px 30px 48px;max-width:1760px;width:100%;margin:0 auto;animation:pageIn .28s var(--ease)}
@keyframes pageIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
@media(min-width:1500px){.grid-4{grid-template-columns:repeat(4,1fr)}.detail-grid{grid-template-columns:1.9fr 1fr;gap:22px}html{font-size:15.5px}}
@media(min-width:1900px){.content{padding:28px 44px 52px}}

.page-head{display:flex;align-items:flex-end;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.page-head h2{font-size:1.42rem;color:var(--doan-ink);letter-spacing:-.02em;font-weight:800}
.eyebrow{font-size:.69rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--gold-2);margin-bottom:3px}
.page-head .spacer{flex:1}

/* ---------- Stats / Cards ---------- */
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:20px}
.stat{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px 18px 15px;box-shadow:var(--shadow);cursor:pointer;overflow:hidden;display:flex;align-items:center;gap:13px;transition:transform .18s var(--ease),box-shadow .18s var(--ease),border-color .18s}
.stat:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:#C6D8EA}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:0 4px 4px 0}
.stat .n{font-size:1.85rem;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.stat .l{font-size:.77rem;color:var(--muted);margin-top:3px;font-weight:500}
.stat-ico{width:44px;height:44px;flex:none;border-radius:13px;display:flex;align-items:center;justify-content:center}
.stat-ico svg{width:21px;height:21px}
.stat.blue::before{background:var(--doan-2)} .stat.blue .n{color:var(--doan)} .stat.blue .stat-ico{background:var(--info-bg);color:var(--doan)}
.stat.green::before{background:var(--ok)} .stat.green .n{color:var(--ok)} .stat.green .stat-ico{background:var(--ok-bg);color:var(--ok)}
.stat.amber::before{background:var(--gold)} .stat.amber .n{color:var(--warn)} .stat.amber .stat-ico{background:var(--warn-bg);color:var(--warn)}
.stat.red::before{background:var(--danger)} .stat.red .n{color:var(--danger)} .stat.red .stat-ico{background:var(--danger-bg);color:var(--danger)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
.card-h{padding:14px 20px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,#FCFDFF,#F8FAFD)}
.card-h h3{font-size:.94rem;color:var(--doan-ink);font-weight:700;letter-spacing:-.01em}
.card-h .spacer{flex:1}
.card-b{padding:18px 20px}

/* ---------- Tabs / Tables ---------- */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
.tabs button{background:none;border:none;padding:9px 15px;font-size:.86rem;color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-2px;font-weight:500;border-radius:8px 8px 0 0;transition:color .15s,background .15s,border-color .2s var(--ease)}
.tabs button:hover{color:var(--doan);background:var(--info-bg)}
.tabs button.active{color:var(--doan);border-bottom-color:var(--doan);font-weight:700}
.tabs button .cnt{background:var(--info-bg);color:var(--doan);border-radius:99px;padding:1px 8px;font-size:.71rem;margin-left:6px;font-weight:700}
.tabs button.active .cnt{background:var(--doan);color:#fff}
.tbl-wrap{overflow-x:auto;border-radius:0 0 var(--r) var(--r)}
table{width:100%;border-collapse:collapse;font-size:.855rem}
th{background:linear-gradient(180deg,#EDF4FC,var(--info-bg));color:var(--doan-deep);text-align:left;padding:10px 13px;font-size:.71rem;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;font-weight:700;border-bottom:1px solid var(--line)}
td{padding:11px 13px;border-bottom:1px solid var(--line-soft);vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tr.rowlink{cursor:pointer;transition:background .12s}
tr.rowlink:hover td{background:#F4F9FF}
.doc-title{color:var(--doan);font-weight:600}
.mono{font-family:"JetBrains Mono",Consolas,Menlo,monospace;font-size:.78rem;white-space:nowrap}
.muted{color:var(--muted)} .small{font-size:.78rem}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:2.5px 11px;font-size:.71rem;font-weight:700;white-space:nowrap;letter-spacing:.01em}
.pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;flex:none}
.pill.role::before{display:none}
.pill.cho{background:var(--warn-bg);color:var(--warn)}
.pill.dang{background:var(--info-bg);color:var(--doan)}
.pill.xong{background:var(--ok-bg);color:var(--ok)}
.pill.qua{background:var(--danger-bg);color:var(--danger)}
.pill.role{background:#EEF2F7;color:#41566B}
.khan-thuong{color:#8CA1B4} .khan-khan{color:var(--gold-2);font-weight:600} .khan-tk{color:var(--danger);font-weight:600} .khan-ht{color:#E25822;font-weight:700}
.empty{padding:38px 20px;text-align:center;color:var(--muted);font-size:.87rem}
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.tpl-card{border:1.5px solid var(--line);border-radius:12px;padding:14px 15px;background:#FBFDFF;display:flex;flex-direction:column}
.tpl-card:hover{border-color:var(--gold);box-shadow:0 4px 14px -6px rgba(240,180,41,.5)}
.tpl-h{font-weight:700;color:var(--doan-deep);line-height:1.3}
.rp-blocks{border-left:3px solid var(--line-soft);padding-left:14px;margin:8px 0}
.rp-fixed{font-weight:700;color:var(--doan-deep);margin:14px 0 6px;padding-bottom:3px;border-bottom:1px dashed var(--line)}
.rp-note{background:var(--info-bg);border-radius:8px;padding:8px 11px;margin:6px 0;line-height:1.4}
.rp-auto{background:var(--gold-soft);border-radius:8px;padding:7px 11px;margin:6px 0;font-weight:600}
code{background:var(--line-soft);padding:1px 5px;border-radius:5px;font-family:ui-monospace,monospace;font-size:.86em}
.seg{display:inline-flex;border:1.5px solid var(--line);border-radius:11px;overflow:hidden;background:#fff;flex-wrap:wrap}
.seg button{background:#fff;border:none;padding:8px 14px;font-size:.83rem;font-weight:600;color:var(--doan-deep);cursor:pointer;border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}
.seg button.on{background:linear-gradient(120deg,#F6C24A,var(--gold));color:var(--doan-ink)}
.pchips{display:flex;flex-wrap:wrap;gap:6px}
.pchip{border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:5px 11px;font-size:.8rem;font-weight:700;color:var(--doan-deep);cursor:pointer;position:relative;transition:all .14s}
.pchip:hover{border-color:var(--gold)}
.pchip.on{background:linear-gradient(120deg,#F6C24A,var(--gold));color:var(--doan-ink);border-color:var(--gold-2)}
.pchip.derived{border-style:dashed;color:var(--gold-2)}
.pchip.derived.on{color:var(--doan-ink)}
.pchip .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ok);margin-left:3px;vertical-align:middle}
.empty::before{content:"";display:block;width:52px;height:52px;margin:0 auto 12px;opacity:.5;
  background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235F7488' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'><path d='M22 12h-6l-2 3h-4l-2-3H2'/><path d='M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z'/></svg>") center/contain no-repeat}

/* ---------- Progress ---------- */
.prog{background:var(--line-soft);border-radius:99px;height:9px;overflow:hidden;min-width:90px;box-shadow:inset 0 1px 2px rgba(10,58,105,.08)}
.prog i{display:block;height:100%;background:linear-gradient(90deg,var(--doan),#3E96E8);border-radius:99px;transition:width .5s var(--ease);box-shadow:0 0 6px rgba(27,117,196,.4)}
.prog.done i{background:linear-gradient(90deg,var(--ok),#28C077);box-shadow:0 0 6px rgba(18,138,80,.4)}

/* ---------- Detail / Timeline ---------- */
.detail-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start}
.meta-tbl td{padding:7px 8px;border:none}
.meta-tbl td:first-child{color:var(--muted);white-space:nowrap;width:140px;font-size:.79rem}
.timeline{position:relative;margin:6px 0 4px;padding-left:28px}
.timeline::before{content:"";position:absolute;left:8px;top:8px;bottom:8px;width:2px;background:linear-gradient(var(--gold),var(--doan-2))}
.tl-item{position:relative;padding:0 0 17px}
.tl-item::before{content:"";position:absolute;left:-25px;top:4px;width:11px;height:11px;background:var(--gold);border:2.5px solid #fff;border-radius:50%;box-shadow:0 0 0 2.5px var(--gold-soft),0 2px 5px rgba(0,0,0,.12)}
.tl-item b{font-size:.85rem;color:var(--doan-ink)}
.tl-item .when{font-size:.71rem;color:var(--muted)}
.tl-item .note{font-size:.82rem;margin-top:2px}
.report-item{border-left:3px solid var(--doan-2);background:linear-gradient(90deg,#F4F9FF,#FBFDFF);border-radius:0 10px 10px 0;padding:10px 14px;margin-bottom:9px}
.report-item .rp-h{display:flex;gap:8px;align-items:center;font-size:.77rem;color:var(--muted);margin-bottom:3px;flex-wrap:wrap}

/* ---------- Compose ---------- */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.recip-group{border:1.5px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.recip-group:hover{border-color:#BFD4E8}
.recip-group>h5{background:linear-gradient(180deg,#EDF4FC,var(--info-bg));color:var(--doan-deep);font-size:.73rem;text-transform:uppercase;letter-spacing:.08em;padding:8px 14px;font-weight:700}
.recip-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid var(--line-soft);font-size:.86rem;cursor:pointer;transition:background .12s}
.recip-row:hover{background:#F7FBFF}
.recip-row select{margin-left:auto;padding:4px 9px;border:1.5px solid var(--line);border-radius:8px;font-size:.77rem;background-color:#fff}
.hint{font-size:.75rem;color:var(--muted);margin-top:5px;line-height:1.55}

/* ---------- Bar chart ---------- */
.bar-row{display:grid;grid-template-columns:190px 1fr 84px;gap:10px;align-items:center;margin-bottom:10px;font-size:.83rem}
.bar-track{background:var(--line-soft);border-radius:7px;height:17px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(10,58,105,.07)}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--doan-deep),var(--doan-2));border-radius:7px;min-width:2px;transition:width .6s var(--ease)}
.bar-fill.gold{background:linear-gradient(90deg,#D99A12,var(--gold))}

/* ---------- Toast / misc ---------- */
.toast{position:fixed;bottom:24px;right:24px;background:rgba(7,32,56,.94);backdrop-filter:blur(8px);color:#fff;padding:12px 18px 12px 15px;border-radius:13px;box-shadow:0 12px 36px -8px rgba(0,0,0,.45);font-size:.86rem;opacity:0;transform:translateY(12px) scale(.97);transition:.3s var(--ease);z-index:99;pointer-events:none;display:flex;align-items:center;gap:10px;max-width:min(420px,90vw);border:1px solid rgba(255,255,255,.12)}
.toast::before{content:"";width:20px;height:20px;flex:none;background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23F0B429' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='10'/><path d='m9 12 2 2 4-4'/></svg>") center/contain no-repeat}
.toast.show{opacity:1;transform:none}
.tag-org{display:inline-block;background:var(--info-bg);color:var(--doan-deep);border-radius:7px;padding:2px 9px;font-size:.76rem;margin:2px 3px 2px 0;font-weight:500}
.tree{list-style:none}
.tree li{padding:5px 0 5px 18px;border-left:2px solid var(--line);margin-left:8px;position:relative}
.tree li::before{content:"";position:absolute;left:-2px;top:17px;width:12px;height:2px;background:var(--line)}
.tree .me{background:var(--gold-soft);border-radius:7px;padding:2px 9px;font-weight:700;color:var(--doan-ink)}

/* ---------- Bell dropdown ---------- */
.bell-pop{position:absolute;right:0;top:44px;width:min(350px,86vw);max-height:400px;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);z-index:70;animation:pop .18s var(--ease)}
@keyframes pop{from{opacity:0;transform:translateY(-6px) scale(.98)}to{opacity:1;transform:none}}
.bell-pop .bp-h{padding:11px 15px;border-bottom:1px solid var(--line-soft);background:linear-gradient(180deg,#FCFDFF,#F8FAFD);position:sticky;top:0}
.bell-item{padding:10px 15px;border-bottom:1px solid var(--line-soft);cursor:pointer;font-size:.8rem;transition:background .12s}
.bell-item:hover{background:#F4F9FF}
.bell-item:last-child{border-bottom:none}
.hm-back{position:fixed;inset:0;background:rgba(7,32,56,.5);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .2s var(--ease)}
@keyframes fade{from{opacity:0}to{opacity:1}}
.hm{background:var(--card);border-radius:18px;box-shadow:var(--shadow-lg);width:min(880px,96vw);max-height:92vh;display:flex;flex-direction:column;overflow:hidden;animation:pop .22s var(--ease)}
.hm-top{display:flex;align-items:center;gap:12px;padding:16px 22px;background:linear-gradient(120deg,var(--doan-deep),var(--doan-ink));color:#fff}
.hm-top .stardot{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#F6C24A,var(--gold));display:flex;align-items:center;justify-content:center;color:var(--doan-ink);flex-shrink:0}
.hm-top h3{margin:0;font-size:1.06rem;font-weight:800;letter-spacing:-.01em}
.hm-top .sub{font-size:.72rem;opacity:.82;font-weight:500}
.hm-x{margin-left:auto;background:rgba(255,255,255,.14);border:none;color:#fff;width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:1.1rem;line-height:1}
.hm-x:hover{background:rgba(255,255,255,.26)}
.hm-tabs{display:flex;gap:2px;padding:0 16px;background:#F6F9FD;border-bottom:1px solid var(--line);flex-wrap:wrap}
.hm-tabs button{background:none;border:none;padding:12px 16px;font-size:.85rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px}
.hm-tabs button.on{color:var(--doan-deep);border-bottom-color:var(--gold)}
.hm-body{padding:22px 26px;overflow-y:auto;line-height:1.6;font-size:.9rem;color:var(--doan-ink)}
.hm-body h4{color:var(--doan-deep);font-size:1.02rem;margin:20px 0 8px;padding-bottom:5px;border-bottom:1.5px solid var(--line-soft)}
.hm-body h4:first-child{margin-top:0}
.hm-body h5{color:var(--doan-deep);font-size:.92rem;margin:16px 0 5px}
.hm-body p{margin:7px 0}
.hm-body ul,.hm-body ol{margin:7px 0;padding-left:22px}
.hm-body li{margin:5px 0}
.hm-body .lead{font-size:.96rem;color:var(--doan-ink);background:var(--info-bg);padding:12px 15px;border-radius:11px;border-left:3px solid var(--doan-blue)}
.hm-feat{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin:12px 0}
.hm-card{border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;background:#FBFDFF}
.hm-card .ic{width:30px;height:30px;border-radius:8px;background:var(--gold-soft);display:flex;align-items:center;justify-content:center;color:var(--gold-2);margin-bottom:7px}
.hm-card b{color:var(--doan-deep);display:block;font-size:.9rem;margin-bottom:3px}
.hm-card span{font-size:.8rem;color:var(--muted);line-height:1.45}
.hm-step{display:flex;gap:12px;margin:10px 0;align-items:flex-start}
.hm-step .num{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#F6C24A,var(--gold));color:var(--doan-ink);font-weight:800;font-size:.82rem;display:flex;align-items:center;justify-content:center}
.hm-step .tx{flex:1}.hm-step .tx b{color:var(--doan-deep)}
.hm-role{border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin:8px 0;background:#fff}
.hm-role b{color:var(--doan-deep)}
.hm-tip{background:var(--gold-soft);border-radius:10px;padding:10px 14px;margin:10px 0;font-size:.85rem}
.hm-kbd{background:var(--doan-deep);color:#fff;padding:1px 7px;border-radius:5px;font-size:.8rem;font-weight:600}
.hm-faq{border-bottom:1px solid var(--line-soft);padding:10px 0}
.hm-faq b{color:var(--doan-deep);display:block;margin-bottom:3px}

/* ---------- Responsive ---------- */
@media(max-width:980px){

  .menu-btn{display:inline-flex}
  .sb-backdrop{display:block;position:fixed;inset:0;background:rgba(7,32,56,.45);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .25s;z-index:55}
  .sb-backdrop.on{opacity:1;pointer-events:auto}
  .topbar{padding:10px 14px}
  .content{padding:16px 14px 40px}
  .userbox>span{display:none}
  .bar-row{grid-template-columns:110px 1fr 70px}
}
@media(max-width:760px){.form-grid{grid-template-columns:1fr}.grid-4{grid-template-columns:1fr 1fr}.page-head h2{font-size:1.22rem}}

@media print{.sidebar,.topbar,.no-print,.sb-backdrop{display:none!important}.shell{display:block}.content{max-width:none;padding:0;animation:none}}

/* chuỗi tổ tiên của một đơn vị (gần gốc trước), suy ra động từ con trỏ parent */
function chainAnc(u){const a=[];let p=u&&u.parent,g=0;while(p&&g++<12){a.unshift(p);p=(unit(p)||{}).parent}return a}
/* bossId có phải cấp trên (bất kỳ tầng nào) của u không */

/* Nén ảnh minh chứng: co về tối đa 900px, JPEG ~72% */
function compressImage(file){
  return new Promise((res,rej)=>{
    const rd=new FileReader();
    rd.onload=()=>{const img=new Image();
      img.onload=()=>{try{
        const MAX=900,ratio=Math.min(1,MAX/Math.max(img.width,img.height));
        const cv=document.createElement("canvas");
        cv.width=Math.round(img.width*ratio);cv.height=Math.round(img.height*ratio);
        cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
        res(cv.toDataURL("image/jpeg",0.72));
      }catch(e){rej(e)}};
      img.onerror=()=>rej(new Error("Không đọc được ảnh "+file.name));
      img.src=rd.result;};
    rd.onerror=()=>rej(new Error("Không đọc được tệp."));
    rd.readAsDataURL(file);});
}

    catch(e){toast("Bỏ qua ảnh "+f.name+": "+e.message)}}

  if(lk)media.push({type:"link",name:lk.includes("youtu")?"Video minh chứng":"Tệp minh chứng (liên kết)",url:lk});
  return media;
}

function onPickFile(inp){
  const list=[...(inp.files||[])];inp.value="";

      if(MODE==="local")DB.docs.push(d);
    }
    d.recipIds=[]; /* chưa phát hành: không công bố nơi nhận lên máy chủ */
    if(kind==="trinh"){
      if(!d.recips.length){toast("Chọn nơi nhận trước khi trình duyệt.");return}
      d.docStatus="trinhduyet";audit(d,"Trình duyệt","Trình Thường trực phê duyệt, phát hành");
    }else if(kind==="publish"){
      if(!isApprover()){toast("Chỉ Bí thư / Phó Bí thư được phát hành trực tiếp.");return}
      if(!d.recips.length){toast("Chọn ít nhất một nơi nhận.");return}
      await publishCore(d);resetCompose();S.draftId=null;nav("vbdi");return;
    }else{audit(d,"Lưu dự thảo","")}
    if(MODE==="local"){save()}
    else if(S.draftId){commit(d)}
    else{await persistNew(d)}
    resetCompose();S.draftId=null;
    toast(kind==="trinh"?"Đã trình duyệt — chờ Bí thư/Phó Bí thư phê duyệt, phát hành.":"Đã lưu dự thảo.");
    nav("vbdi",{outTab:kind==="trinh"?"trinh":"duthao"});
  }catch(e){toast("Lỗi: "+e.message)}
}
/* Phát hành: LÚC NÀY mới cấp số ký hiệu theo sổ văn bản đi */
async function publishCore(d){
  const m=me();
  d.recipIds=d.recips.map(r=>r.unit);
  if(MODE==="cloud"){
    const y=new Date().getFullYear(),key=m.id+"_"+y;
    const so=await FB.fs.runTransaction(async tx=>{
      const ref=FB.fs.collection("seq").doc(key);
      const sn=await tx.get(ref);const n=(sn.exists?sn.data().n:0)+1;
      tx.set(ref,{n});return n+"/"+LOAI[d.loai][0]+"-"+m.code;});
    d.so=so;
  }else{d.so=nextSo(m,d.loai)}
  d.ngayBH=todayISO();d.docStatus="phathanh";delete d.returnNote;
  d.recips.forEach(r=>{r.receivedAt=todayISO()});
  audit(d,"Phát hành văn bản","Gửi "+d.recips.length+" đơn vị"+(d.yeuCauBaoCao?" (yêu cầu báo cáo kết quả)":""));
  if(MODE==="local"){if(!DB.docs.some(x=>x.id===d.id))DB.docs.push(d);save()}
  else{await FB.fs.collection("docs").doc(d.id).set(JSON.parse(JSON.stringify(d)));
    if(!DB.docs.some(x=>x.id===d.id))DB.docs.push(d)}
  toast("Đã phát hành văn bản số "+d.so);
  notifyChannels(d);
}

/* Chuyển tiếp: tạo văn bản triển khai gửi các đơn vị cấp dưới, giữ chuỗi liên kết
   với văn bản gốc (origId / parentDocId) để truy vết xuyên cấp. */
function fwdFileBudget(){return MODE==="cloud"?450000:900000}
async function forwardDoc(id){
  const m=me(),d=DB.docs.find(x=>x.id===id),r=myRecip(d);
  if(!d||!r||dstat(d)!=="phathanh"){toast("Chỉ chuyển tiếp được văn bản đã phát hành mà đơn vị là nơi nhận.");return}
  const picks=[...document.querySelectorAll(".fw-cb:checked")].map(c=>c.value);
  if(!picks.length){toast("Chọn ít nhất một đơn vị cấp dưới nhận triển khai.");return}
  const g=i=>{const el=document.getElementById(i);return el?el.value:""};
  const ty=(g("fw-ty")||"").trim();
  if(!ty){toast("Nhập trích yếu văn bản triển khai.");return}
  const chiDao=(g("fw-nd")||"").trim();
  const recips=picks.map(u=>({unit:u,role:(document.getElementById("fwrole-"+u)||{}).value||"XLC",
    status:"choxuly",receivedAt:todayISO(),viewed:false,progress:0,reports:[]}));
  /* Sao chép tệp trong ngân sách dung lượng an toàn của Firestore; tệp vượt mức giữ tên/liên kết */
  let bud=fwdFileBudget(),dropped=0;
  const files=docFiles(d).map(f=>{const c={name:f.name,size:f.size||0};
    if(f.link)c.link=f.link;
    if(f.dataUrl){if(f.dataUrl.length<=bud){c.dataUrl=f.dataUrl;bud-=f.dataUrl.length}else dropped++}
    return c});
  if(dropped)toast(dropped+" tệp lớn chỉ chuyển kèm tên — hãy dùng liên kết Google Drive cho tệp nặng.");
  const nd=(chiDao?("Ý KIẾN CHỈ ĐẠO CỦA "+m.name.toUpperCase()+":\n"+chiDao+"\n\n"):"")
    +"— Triển khai "+(LOAI[d.loai]?LOAI[d.loai][1]:"văn bản")+" số "+d.so+" ngày "+fmtD(d.ngayBH)
    +" của "+((unit(d.from)||{}).name||"cấp trên")+"."
    +(d.noiDung?("\n\nNỘI DUNG VĂN BẢN GỐC:\n"+d.noiDung):"");
  const nu={id:uid("d"),so:"",from:m.id,loai:d.loai,trichYeu:ty,noiDung:nd,
    doKhan:g("fw-khan")||d.doKhan,hanXuLy:g("fw-han")||d.hanXuLy||null,
    yeuCauBaoCao:!!(document.getElementById("fw-ycbc")||{}).checked,
    replyTo:null,files,attachedDocs:[attSnapshot(d),...(d.attachedDocs||[])].slice(0,6),
    origId:d.origId||d.id,parentDocId:d.id,parentSo:d.so,parentFrom:d.from,
    comments:[],recips,recipIds:[],docStatus:"duthao",
    audit:[{time:todayISO(),unit:m.id,action:"Tạo văn bản chuyển tiếp",note:"Triển khai từ "+d.so+" của "+((unit(d.from)||{}).short||"?"),nguoi:memberLabel()}]};
  try{
    if(isApprover()){await publishCore(nu)}
    else{nu.docStatus="trinhduyet";nu.audit.push({time:todayISO(),unit:m.id,action:"Trình duyệt",note:"Trình Thường trực phê duyệt văn bản chuyển tiếp",nguoi:memberLabel()});
      await persistNew(nu);toast("Đã lập văn bản chuyển tiếp và trình Bí thư/Phó Bí thư phê duyệt, phát hành.")}
    (r.forwards=r.forwards||[]).push({docId:nu.id,so:nu.so||"(chờ duyệt)",units:picks,time:todayISO()});
    audit(d,"Chuyển tiếp xuống cấp dưới","→ "+picks.map(u=>(unit(u)||{}).short||"?").join(", ")+(isApprover()?" (VB số "+nu.so+")":" (chờ duyệt)"));
    commit(d);if(MODE==="local")save();
    S.fwdOpen=null;render();
  }catch(e){toast("Lỗi chuyển tiếp: "+e.message)}
}
/* ========== v4.0 · GIAI ĐOẠN 3 (client): THÔNG BÁO DISCORD TỨC THỜI, MIỄN PHÍ ==========
   Mỗi đơn vị khai Webhook Discord trong Sơ đồ tổ chức → Sửa thông tin. Khi phát hành
   văn bản, hệ thống bắn thông báo vào kênh Discord của TỪNG đơn vị nhận (fire-and-forget,
   dùng FormData/payload_json nên không vướng CORS preflight). Email + nhắc định kỳ khi
   không ai mở web do Google Apps Script đảm nhiệm (xem Code.gs kèm theo). */
function notifyChannels(d){
  try{
    (d.recips||[]).forEach(rc=>{
      const u=unit(rc.unit);
      if(!u||!u.webhook||!/^https:\/\/(discord\.com|discordapp\.com)\/api\/webhooks\//.test(u.webhook))return;
      const fd=new FormData();
      fd.append("payload_json",JSON.stringify({content:
        "📩 **"+me().name+"** vừa phát hành "+(LOAI[d.loai]?LOAI[d.loai][1]:"văn bản")
        +" số **"+d.so+"**\n— "+d.trichYeu
        +(d.hanXuLy?"\n⏰ Hạn xử lý: "+fmtD(d.hanXuLy):"")
        +(d.doKhan&&d.doKhan!=="thuong"?"\n🔥 Độ khẩn: **"+((KHAN[d.doKhan]||[])[0]||d.doKhan).toUpperCase()+"**":"")
        +"\nĐăng nhập DoanOffice để tiếp nhận, xử lý."}));
      fetch(u.webhook,{method:"POST",body:fd}).catch(()=>{});
    });
  }catch(e){}
}

/* -------- Trung tâm thông báo trong app -------- */
function notifItems(){
  const m=me(),out=[],rOf=d=>myRecipOf(d,m.id);
  myInbox().forEach(d=>{const r=rOf(d);
    if(dstat(d)!=="phathanh")return;
    if(!r.viewed)out.push({t:"Văn bản mới chưa xem",d,w:0});
    else if(isOverdue(d,r))out.push({t:"QUÁ HẠN xử lý (hạn "+fmtD(d.hanXuLy)+")",d,w:2});
    else if(isDueSoon(d,r))out.push({t:"Sắp đến hạn "+fmtD(d.hanXuLy),d,w:1});});
  myOutbox().forEach(d=>{
    if(dstat(d)==="trinhduyet"&&isApprover())out.push({t:"Dự thảo chờ bạn phê duyệt",d,w:1});
    if(dstat(d)==="duthao"&&d.returnNote)out.push({t:"Dự thảo bị trả lại: "+d.returnNote,d,w:1});});
  return out.sort((a,b)=>b.w-a.w);
}
function tryBrowserNotify(){
  try{
    if(sessionStorage.getItem("do_nt"))return;sessionStorage.setItem("do_nt","1");
    const urgent=notifItems().filter(x=>x.w===2).length;
    if(!urgent||typeof Notification==="undefined")return;
    const fire=()=>new Notification("DoanOffice — "+me().short,{body:"Có "+urgent+" văn bản QUÁ HẠN xử lý."});
    if(Notification.permission==="granted")fire();
    else if(Notification.permission!=="denied")Notification.requestPermission().then(p=>{if(p==="granted")fire()});
  }catch(e){}
}

function render(){
  const app=document.getElementById("app");
  if(S.view==="setup"&&MODE==="cloud"&&!DB.session){app.innerHTML=viewSetup();return}
  if(!DB.session){app.innerHTML=viewLogin();return}
  if(members(me()).length&&!curMember()){app.innerHTML=viewPickMember();return}
  S._stale=false;
  const views={dashboard:viewDashboard,vbden:viewInbox,vbdi:viewOutbox,soan:viewCompose,detail:viewDetail,thongke:viewStats,danhba:viewOrg,hethong:viewSystem,chitieu:viewTargets,lich:viewCalendar,timkiem:viewSearch,kho:viewLibrary,dinhky:viewPeriodic,maubc:viewReports,nhaclich:viewReminders};
  app.innerHTML=shell((views[S.view]||viewDashboard)());
  if(S.pendingDoc){const pid=S.pendingDoc;
    if(DB.docs.some(x=>x.id===pid)){S.pendingDoc=null;setTimeout(()=>openDoc(pid),0)}}
  if(S.qr&&S.view==="detail")renderQR();
  if(S.view==="soan"){updateFileListUI();updateAttListUI()}
  if(S.view==="nhaclich"){try{rmCycleUI()}catch(e){}}
}
function renderQR(){
  const box=document.getElementById("qrbox");if(!box)return;
  const d=DB.docs.find(x=>x.id===S.qr);if(!d)return;
  const text=(location.origin&&location.origin!=="null"?location.origin+location.pathname:"")+"#vb="+d.id;
  const draw=()=>{try{box.innerHTML="";new QRCode(box,{text,width:142,height:142,correctLevel:QRCode.CorrectLevel.M})}catch(e){box.innerHTML='<span class="small mono" style="word-break:break-all;padding:6px">'+esc(text)+'</span>'}};
  if(typeof QRCode!=="undefined"){draw();return}
  const sc=document.createElement("script");
  sc.src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
  sc.onload=draw;
  sc.onerror=()=>{box.innerHTML='<span class="small mono" style="word-break:break-all;padding:6px">'+esc(text)+'</span>'};
  document.head.appendChild(sc);
}

function myRecipOf(d,uid_){return d.recips.find(r=>r.unit===uid_)}
function statusPill(d,r){
  if(dstat(d)==="thuhoi")return '<span class="pill role">Đã thu hồi</span>';
  if(isOverdue(d,r))return '<span class="pill qua">Quá hạn</span>';
  return {choxuly:'<span class="pill cho">Chờ xử lý</span>',dangxuly:'<span class="pill dang">Đang xử lý</span>',daxuly:'<span class="pill xong">Đã xử lý</span>'}[r.status];
}
function khanCell(k){const[label,cls,sym]=KHAN[k];return `<span class="${cls}" title="Độ khẩn: ${label}">${sym} ${label}</span>`}

      <td>${statusPill(d,rOf(d))}</td></tr>`).join(""):'<tr><td colspan="3" class="empty">Chưa có văn bản đến.</td></tr>'}

/* ---------- Văn bản đến ---------- */
function viewInbox(){
  const m=me(),all=myInbox(),rOf=d=>myRecipOf(d,m.id);
  const buckets={
    tatca:all,
    choxuly:all.filter(d=>rOf(d).status==="choxuly"),
    dangxuly:all.filter(d=>rOf(d).status==="dangxuly"),
    sapden:all.filter(d=>isDueSoon(d,rOf(d))),
    quahan:all.filter(d=>isOverdue(d,rOf(d))),
    daxuly:all.filter(d=>rOf(d).status==="daxuly")};
  const labels={tatca:"Tất cả",choxuly:"Chờ xử lý",dangxuly:"Đang xử lý",sapden:"Sắp đến hạn",quahan:"Quá hạn",daxuly:"Đã xử lý"};
  if(!(S.tab in buckets))S.tab="choxuly";
  const q=(S.q||"").toLowerCase();
  const rows=buckets[S.tab].filter(d=>!q||d.trichYeu.toLowerCase().includes(q)||d.so.toLowerCase().includes(q));
  return `
  <div class="page-head"><div><div class="eyebrow">Sổ đăng ký văn bản đến</div><h2>Văn bản đến</h2></div></div>
  <div class="card"><div class="card-b">
  <div class="tabs">${Object.keys(buckets).map(k=>`<button class="${S.tab===k?"active":""}" onclick="S.tab='${k}';render()">${labels[k]}<span class="cnt">${buckets[k].length}</span></button>`).join("")}</div>
  <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <input style="flex:1;min-width:220px;padding:8px 12px;border:1px solid var(--line);border-radius:8px" placeholder="Tìm theo trích yếu / số ký hiệu…" value="${esc(S.q||"")}" oninput="S.q=this.value;render();this.focus();this.setSelectionRange(this.value.length,this.value.length)">
    <button class="btn btn-ghost btn-sm" onclick="exportInboxCSV()">⬇ Xuất danh sách</button>
  </div>
  <div class="tbl-wrap"><table><thead><tr>
    <th>Số ký hiệu</th><th>Trích yếu</th><th>Vai trò</th><th>Nơi gửi</th><th>Hạn xử lý</th><th>Độ khẩn</th><th>Trạng thái</th></tr></thead><tbody>
  ${rows.length?rows.map(d=>{const r=rOf(d);return `<tr class="rowlink" onclick="openDoc('${d.id}')">
    <td class="mono">${esc(d.so)}${r.viewed?"":' <span title="Chưa xem" style="color:var(--danger)">●</span>'}</td>
    <td><span class="doc-title">${esc(d.trichYeu)}</span><div class="small muted">${LOAI[d.loai][1]} · ban hành ${fmtD(d.ngayBH)}${docFiles(d).length?' · 📎 '+docFiles(d).length+' tệp':''}${(d.attachedDocs||[]).length?' · 🧷 '+d.attachedDocs.length+' VB kèm':''}</div></td>
    <td><span class="pill role">${ROLE[r.role]}</span></td>
    <td class="small">${esc(unit(d.from).short)}</td>
    <td class="small ${isOverdue(d,r)?'khan-tk':''}">${fmtD(d.hanXuLy)}</td>
    <td class="small">${khanCell(d.doKhan)}</td>
    <td>${statusPill(d,r)}${d.yeuCauBaoCao&&r.status!=="daxuly"?'<div class="small muted">yêu cầu báo cáo</div>':''}</td></tr>`}).join("")
   :`<tr><td colspan="7" class="empty">Không có văn bản trong mục này.</td></tr>`}
  </tbody></table></div></div></div>`;
}
function exportInboxCSV(){
  const m=me(),rows=[["Số ký hiệu","Trích yếu","Loại","Nơi gửi","Ngày ban hành","Hạn xử lý","Vai trò","Trạng thái","Tiến độ (%)"]];
  myInbox().forEach(d=>{const r=myRecipOf(d,m.id);
    rows.push([d.so,d.trichYeu,LOAI[d.loai][1],unit(d.from).name,fmtD(d.ngayBH),fmtD(d.hanXuLy),ROLE[r.role],
      isOverdue(d,r)?"Quá hạn":{choxuly:"Chờ xử lý",dangxuly:"Đang xử lý",daxuly:"Đã xử lý"}[r.status],r.progress])});
  exportCSV(rows,"van-ban-den-"+m.code+".csv");
}

/* ---------- Văn bản đi (v2.0: dự thảo → duyệt → phát hành) ---------- */
function viewOutbox(){
  const out=myOutbox();
  const pub=out.filter(d=>dstat(d)==="phathanh");
  const buckets={
    duthao:out.filter(d=>dstat(d)==="duthao"),
    trinh:out.filter(d=>dstat(d)==="trinhduyet"),
    all:pub,
    cho:pub.filter(d=>d.recips.some(r=>r.status!=="daxuly")),
    xong:pub.filter(d=>d.recips.every(r=>r.status==="daxuly")),
    thuhoi:out.filter(d=>dstat(d)==="thuhoi")};
  const labels={duthao:"Dự thảo",trinh:"Chờ duyệt",all:"Đã phát hành",cho:"Đang theo dõi",xong:"Đã xử lý xong",thuhoi:"Đã thu hồi"};
  if(!(S.outTab in buckets))S.outTab="all";
  const rows=buckets[S.outTab];
  const draftMode=["duthao","trinh"].includes(S.outTab);
  return `
  <div class="page-head"><div><div class="eyebrow">Sổ đăng ký văn bản đi</div><h2>Văn bản đi</h2></div>
  <div class="spacer"></div>
  <button class="btn btn-ghost" onclick="resetCompose();S.draftId=null;nav('soan');S.quick=true;render()">📎 Gửi nhanh tệp có sẵn</button>
  <button class="btn btn-gold" onclick="resetCompose();S.draftId=null;nav('soan')">✎ Soạn văn bản mới</button></div>
  <div class="card"><div class="card-b">
  <div class="tabs">${Object.keys(buckets).map(k=>`<button class="${S.outTab===k?"active":""}" onclick="S.outTab='${k}';render()">${labels[k]}<span class="cnt">${buckets[k].length}</span></button>`).join("")}</div>
  <div class="tbl-wrap"><table><thead><tr>
    <th>Số ký hiệu</th><th>Trích yếu</th><th>Nơi nhận</th><th>Ngày</th><th>Hạn</th><th>${draftMode?"Thao tác":"Tiến độ chung"}</th></tr></thead><tbody>
  ${rows.length?rows.map(d=>{
    const avg=d.recips.length?Math.round(d.recips.reduce((s2,r)=>s2+r.progress,0)/d.recips.length):0;
    return `<tr class="rowlink" onclick="openDoc('${d.id}')">
    <td class="mono">${d.so?esc(d.so):'<span class="muted">(chưa cấp số)</span>'}</td>
    <td><span class="doc-title">${esc(d.trichYeu)}</span>
      <div class="small muted">${LOAI[d.loai][1]} · ${khanCell(d.doKhan)}${d.yeuCauBaoCao?" · có giao việc/báo cáo":""}${d.returnNote?` · <span style="color:var(--danger)">bị trả lại: ${esc(d.returnNote)}</span>`:""}</div></td>
    <td class="small">${d.recips.map(r=>`<span class="tag-org">${esc((unit(r.unit)||{}).short||"?")}</span>`).join("")||'<span class="muted">—</span>'}</td>
    <td class="small">${fmtD(d.ngayBH)}</td><td class="small">${fmtD(d.hanXuLy)}</td>
    <td onclick="event.stopPropagation()">
    ${dstat(d)==="duthao"?`<button class="btn btn-ghost btn-sm" onclick="editDraft('${d.id}')">✎ Sửa</button>
      <button class="btn btn-primary btn-sm" onclick="editDraft('${d.id}')">📨 Trình / Phát hành</button>
      <button class="btn btn-sm" style="background:var(--danger-bg);color:var(--danger)" onclick="deleteDraft('${d.id}')">🗑</button>`
    :dstat(d)==="trinhduyet"?(isApprover()
      ?`<button class="btn btn-ok btn-sm" onclick="approvePublish('${d.id}')">✔ Duyệt & phát hành</button>
        <button class="btn btn-ghost btn-sm" onclick="returnDraft('${d.id}')">↩ Trả lại</button>`
      :'<span class="pill cho">Chờ Bí thư/PBT duyệt</span>')
    :dstat(d)==="thuhoi"?'<span class="pill role">Đã thu hồi</span>'
    :`<div style="display:flex;gap:8px;align-items:center"><div class="prog ${avg>=100?"done":""}"><i style="width:${avg}%"></i></div><span class="small">${avg}%</span></div>`}
    </td></tr>`}).join("")
   :`<tr><td colspan="6" class="empty">${draftMode?"Không có dự thảo nào ở mục này.":"Chưa có văn bản. Bấm “Soạn văn bản mới” để bắt đầu."}</td></tr>`}
  </tbody></table></div>
  <div class="hint" style="margin-top:8px">Quy trình: <b>Dự thảo</b> (cán bộ soạn) → <b>Trình duyệt</b> → Bí thư/Phó Bí thư <b>phê duyệt & phát hành</b> (lúc này mới cấp số ký hiệu) → theo dõi xử lý. Văn bản phát hành sai có thể <b>thu hồi</b> trong trang chi tiết.</div>
  </div></div>`;
}
/* ---------- Soạn văn bản (v2.0: dự thảo & phê duyệt) ---------- */

   ${dr?`<div class="spacer"></div><button class="btn btn-ghost btn-sm" onclick="S.draftId=null;nav('vbdi',{outTab:'duthao'})">✕ Hủy sửa</button>`:""}</div>
  ${dr&&dr.returnNote?`<div class="card" style="border-left:4px solid var(--danger)"><div class="card-b small">↩ <b>Dự thảo bị trả lại:</b> ${esc(dr.returnNote)}</div></div>`:""}

      <select id="c-tpl" onchange="applyTemplate(this.value)"><option value="">— Soạn tự do —</option>
      ${Object.entries(TEMPLATES).map(([k,t])=>`<option value="${k}">${t.ten}</option>`).join("")}</select>
      <div class="hint">Chọn mẫu để đổ khung thể thức (mục đích – yêu cầu, nội dung, tổ chức thực hiện…) rồi điền vào chỗ [ … ].</div></div>`}
    <div class="form-grid">
      <div class="field"><label>Loại văn bản</label><select id="c-loai">${Object.entries(LOAI).map(([k,vv])=>`<option value="${k}" ${dr&&dr.loai===k?"selected":""}>${vv[1]} (${vv[0]})</option>`).join("")}</select></div>
      <div class="field"><label>Độ khẩn</label><select id="c-khan">${Object.entries(KHAN).map(([k,vv])=>`<option value="${k}" ${dr&&dr.doKhan===k?"selected":""}>${vv[0]}</option>`).join("")}</select></div>
    </div>

    <div class="field"><label>Nội dung / ý kiến chỉ đạo${quick?" (không bắt buộc)":""}</label><textarea id="c-nd" rows="${quick?2:5}" placeholder="${quick?"Bỏ trống nếu toàn bộ nội dung nằm trong tệp — hệ thống tự ghi chú.":"Nội dung chính, yêu cầu thực hiện, phân công…"}">${v("noiDung")}</textarea></div>
    <div class="form-grid">

        <select id="c-reply"><option value="">— Không —</option>

    </div>
    <div class="field"><label>Tệp đính kèm — chọn được NHIỀU tệp (PDF/Word/Excel/PPT/ảnh…), mỗi tệp ≤ ${FILE_LIMIT_KB}KB lưu kèm văn bản</label>

    <div class="field"><label>Liên kết Google Drive cho tệp lớn — mỗi dòng một liên kết, có thể ghi “Tên tệp | https://…”</label>

    <div class="field"><label>🧷 Văn bản kèm theo / liên quan (đã có trên hệ thống)</label>
      <div style="display:flex;gap:8px">
        <select id="c-att" style="flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:8px">
          <option value="">— Chọn văn bản để gửi kèm —</option>
          ${searchCorpus().filter(x=>["phathanh","thuhoi"].includes(dstat(x))&&(!dr||x.id!==dr.id)).map(x=>`<option value="${x.id}">${esc(x.so)} · ${esc(x.trichYeu.slice(0,55))}</option>`).join("")}
        </select>
        <button class="btn btn-ghost" onclick="addAttachedDoc()">＋ Kèm theo</button></div>
      <div class="hint" id="att-list">Chưa kèm văn bản nào.</div>
      <div class="hint">Nơi nhận sẽ thấy thông tin tham chiếu (số, trích yếu, nơi ban hành, liên kết tệp nếu có); nếu họ có quyền đọc bản gốc thì mở thẳng được trên hệ thống.</div></div>
    <label style="display:flex;gap:8px;align-items:center;font-size:.88rem;margin:6px 0 14px">
      <input type="checkbox" id="c-ycbc" ${dr?(dr.yeuCauBaoCao?"checked":""):"checked"}> Giao việc kèm văn bản — yêu cầu nơi nhận <b>báo cáo tiến độ, kết quả</b> về đơn vị</label>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="composeSave('draft')">💾 Lưu dự thảo</button>

        ?`<button class="btn btn-primary" onclick="composeSave('publish')">📨 Phát hành & gửi ngay</button>`
        :`<button class="btn btn-primary" onclick="composeSave('trinh')">📮 Trình Bí thư / PBT duyệt</button>`}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
      ${quick?"":`<button class="btn btn-ghost btn-sm" id="ai-draft-btn" onclick="aiDraft()">✨ AI soạn giúp</button>`}
      <button class="btn btn-ghost btn-sm" id="ai-sug-btn" onclick="aiSuggest()">✨ AI gợi ý nơi nhận & hạn</button>
    </div>
    <div class="small" id="ai-sug-out" style="margin-top:6px"></div>
    <div class="hint" style="margin-top:8px">${isApprover()
      ?"Bạn có quyền phê duyệt nên được phát hành trực tiếp; số ký hiệu cấp tự động lúc phát hành."
      :"Vai "+(curMember()?ROLES[curMember().role]:"cán bộ")+" soạn và trình; Bí thư / Phó Bí thư sẽ phê duyệt, phát hành (khi đó văn bản mới được cấp số và gửi đi)."}</div>
  </div></div>
  <div class="card"><div class="card-h"><h3>Nơi nhận</h3></div><div class="card-b">
    ${grp("Báo cáo lên cấp trên",sup,"XDB","Văn bản báo cáo, tờ trình gửi cấp trên trực tiếp.")}
    ${grp("Chỉ đạo đơn vị trực thuộc",sub,"XLC","Cấp dưới nhận vai trò Xử lý chính sẽ phải tiếp nhận, xử lý và báo cáo.")}
    ${grp("Phối hợp đơn vị ngang cấp",sib,"PH","Các đơn vị cùng trực thuộc một cấp trên.")}
    ${grp("Lưu hành nội bộ",[m],"XLC","Văn bản nội bộ: gửi cho chính đơn vị để phân công cán bộ xử lý, theo dõi như văn bản đến.")}
  </div></div></div>`;
}
/* ---------- Chi tiết văn bản + truy vết ---------- */
function viewDetail(){
  const d=DB.docs.find(x=>x.id===S.docId);
  if(!d)return '<div class="empty">Không tìm thấy văn bản.</div>';
  const m=me(),r=myRecip(d),isSender=d.from===m.id;
  const reply=d.replyTo?DB.docs.find(x=>x.id===d.replyTo):null;
  const back=isSender&&!r?"vbdi":"vbden";
  const st=dstat(d);
  /* khối thao tác của nơi nhận */
  let actions="";
  if(st==="thuhoi"){
    actions=`<div class="card" style="border-left:4px solid var(--danger)"><div class="card-b">
      ⛔ <b>Văn bản đã bị thu hồi</b> bởi nơi ban hành — không xử lý, không căn cứ thực hiện. Chi tiết lý do xem tại Truy vết.</div></div>`;
  }else if(st!=="phathanh"&&isSender){
    actions=`<div class="card" style="border-left:4px solid var(--warn)"><div class="card-b">
      📝 Văn bản đang ở trạng thái <b>${DSTAT[st]}</b> — chưa cấp số, chưa gửi tới nơi nhận.
      ${st==="duthao"?`<button class="btn btn-primary btn-sm" style="margin-left:8px" onclick="editDraft('${d.id}')">✎ Tiếp tục soạn</button>`:""}
      ${st==="trinhduyet"&&isApprover()?`<button class="btn btn-ok btn-sm" style="margin-left:8px" onclick="approvePublish('${d.id}')">✔ Duyệt & phát hành</button>
        <button class="btn btn-ghost btn-sm" onclick="returnDraft('${d.id}')">↩ Trả lại</button>`:""}
    </div></div>`;
  }else if(r&&r.status==="choxuly"){
    actions=`<div class="card" style="border-left:4px solid var(--warn)"><div class="card-b">
      <b>Văn bản đang chờ đơn vị tiếp nhận.</b>
      <div class="small muted" style="margin:4px 0 10px">Theo quy định văn thư, văn bản đến phải được đăng ký, tiếp nhận và chuyển xử lý ngay trong ngày (văn bản khẩn: ngay khi nhận).</div>
      <button class="btn btn-primary" onclick="receiveDoc('${d.id}')">✔ Tiếp nhận & bắt đầu xử lý</button></div></div>`;
  }else if(r&&r.status==="dangxuly"&&st==="phathanh"){
    actions=`<div class="card"><div class="card-h"><h3>Báo cáo tiến độ lên ${esc(unit(d.from).short)}</h3></div><div class="card-b">
      <div class="form-grid">
        <div class="field"><label>Tiến độ hoàn thành (%)</label><input id="rp-prog" type="number" min="0" max="100" step="5" value="${r.progress}"></div>
        <div class="field" style="display:flex;align-items:flex-end;padding-bottom:14px"><div class="prog" style="width:100%"><i style="width:${r.progress}%"></i></div></div>
      </div>
      <div class="field"><label>Nội dung báo cáo kết quả *</label><textarea id="rp-note" rows="3" placeholder="Kết quả thực hiện, số liệu, khó khăn – kiến nghị…"></textarea></div>
      <div class="form-grid">
        <div class="field"><label>Ảnh minh chứng (tối đa 4 ảnh — tự nén gọn)</label><input id="rp-imgs" type="file" accept="image/*" multiple></div>
        <div class="field"><label>Liên kết video / âm thanh / hồ sơ (Drive, YouTube…)</label><input id="rp-mlink" placeholder="https://…"></div>
      </div>
      <button class="btn btn-primary" onclick="submitReport('${d.id}')">📤 Gửi báo cáo</button>
      <button class="btn btn-ok" style="margin-left:8px" onclick="if(confirm('Xác nhận đã hoàn thành xử lý văn bản này?'))markDone('${d.id}')">✔ Hoàn thành xử lý</button>
    </div></div>`;
  }else if(r&&r.status==="daxuly"&&st==="phathanh"){
    actions=`<div class="card" style="border-left:4px solid var(--ok)"><div class="card-b">✔ Đơn vị đã <b>hoàn thành xử lý</b> văn bản này${d.yeuCauBaoCao?" và đã gửi báo cáo kết quả.":"."}</div></div>`;

    ${r.butphe.map(b=>`<div class="report-item" style="border-left-color:var(--gold);background:#FFFDF4">
      <div class="rp-h"><b style="color:var(--doan-deep)">${esc(b.nguoi||"Lãnh đạo")}</b> · ${esc(fmtTS(b.time))}${b.han?` · <span style="color:var(--danger)">hạn ${fmtD(b.han)}</span>`:""}${b.giao?` · giao <b>${esc(b.giao)}</b>`:""}</div>

  </div></div>`:"";
  /* v4.0 · Chuyển tiếp xuống cấp dưới (đơn vị nhận có cấp dưới trong nhánh) */

function exportDocCSV(id){

function donutHTML(parts){
  const total=parts.reduce((a,p)=>a+p.v,0);
  if(!total)return '<div class="empty">Chưa có dữ liệu trong kỳ.</div>';
  const R=44,C=2*Math.PI*R;let off=0;
  const segs=parts.filter(p=>p.v>0).map(p=>{
    const len=p.v/total*C;
    const el=`<circle r="${R}" cx="60" cy="60" fill="none" stroke="${p.c}" stroke-width="20" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 60 60)"/>`;
    off+=len;return el;}).join("");
  return `<div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap">
    <svg width="120" height="120" viewBox="0 0 120 120">${segs}
      <text x="60" y="57" text-anchor="middle" font-size="22" font-weight="800" fill="var(--doan-deep)">${total}</text>
      <text x="60" y="74" text-anchor="middle" font-size="9" fill="var(--muted)">văn bản</text></svg>
    <div class="small">${parts.map(p=>`<div style="margin-bottom:4px"><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:${p.c};margin-right:7px"></span>${esc(p.l)}: <b>${p.v}</b> (${Math.round(p.v/total*100)}%)</div>`).join("")}</div>
  </div>`;
}

function exportStatsCSV(){
  const m=me();
  const rows=[["BÁO CÁO TÌNH HÌNH XỬ LÝ VĂN BẢN — "+m.name],["Kỳ báo cáo",(S.statFrom?fmtD(S.statFrom):"Từ đầu")+" đến "+(S.statTo?fmtD(S.statTo):"nay")],[],
    ["Đơn vị","Được giao","Hoàn thành","Đang xử lý","Chưa tiếp nhận","Quá hạn","Tiến độ TB (%)"]];
  const from=S.statFrom,to=S.statTo,inRange=d=>(!from||d.ngayBH>=from)&&(!to||d.ngayBH<=to);
  const byUnit={};
  myOutbox().filter(inRange).forEach(d=>d.recips.forEach(r=>{
    const b=byUnit[r.unit]=byUnit[r.unit]||{giao:0,xong:0,dang:0,cho:0,qua:0,progSum:0};
    b.giao++;b.progSum+=r.progress;if(isOverdue(d,r))b.qua++;
    if(r.status==="daxuly")b.xong++;else if(r.status==="dangxuly")b.dang++;else b.cho++;}));
  Object.entries(byUnit).forEach(([k,b])=>rows.push([unit(k).name,b.giao,b.xong,b.dang,b.cho,b.qua,Math.round(b.progSum/b.giao)]));
  exportCSV(rows,"bao-cao-xu-ly-vb-"+m.code+".csv");
}

function _norm(t){return (t||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/đ/g,"d")}
/* Hàm thuần (test được): nhận mảng dòng [ [cột..] ], trả {items, errors} đã xếp thứ tự cha trước con */
function parseOrgRows(rows){
  const errors=[],m=me();
  if(!rows||rows.length<2)return {items:[],errors:["File không có dữ liệu."]};
  const head=rows[0].map(_norm);
  const col=(kw,excl)=>head.findIndex(h=>kw.every(k=>h.includes(k))&&(!excl||!excl.some(k=>h.includes(k))));
  const ci={name:col(["ten","day du"]),short:col(["ten gon"]),code:col(["ma"]),
    user:col(["tai khoan"],["truc thuoc"]),pass:col(["mat khau"]),parent:col(["truc thuoc"]),
    diachi:col(["dia chi"]),sdt:col(["dien thoai"]),email:col(["email"])};
  if(ci.name<0||ci.code<0||ci.user<0||ci.pass<0)return {items:[],errors:["Không nhận diện được tiêu đề cột — hãy dùng đúng file mẫu."]};
  const raw=[];
  rows.slice(1).forEach((r,idx)=>{
    if(!r||r.every(c=>!(c??"").toString().trim()))return;
    const g=i=>i>=0?(r[i]??"").toString().trim():"";
    const it={row:idx+2,name:g(ci.name),short:g(ci.short)||g(ci.name),
      code:g(ci.code).toUpperCase().replace(/\s+/g,""),user:g(ci.user).toLowerCase().replace(/\s+/g,""),
      pass:g(ci.pass),parentUser:g(ci.parent).toLowerCase().replace(/\s+/g,""),
      diachi:g(ci.diachi),dienthoai:g(ci.sdt),email:g(ci.email)};
    if(!it.name||!it.code)errors.push("Dòng "+it.row+": thiếu Tên hoặc Mã ký hiệu.");
    else if(!/^[a-z0-9._-]+$/.test(it.user))errors.push("Dòng "+it.row+": tài khoản “"+it.user+"” không hợp lệ (chữ thường không dấu, số, . _ -).");
    else if(DB.units.some(x=>x.user===it.user)||raw.some(x=>x.user===it.user))errors.push("Dòng "+it.row+": tài khoản “"+it.user+"” bị trùng.");
    else if((it.pass||"").length<6)errors.push("Dòng "+it.row+": mật khẩu tối thiểu 6 ký tự.");
    else raw.push(it);});
  /* xếp cha trước con; kiểm tra quyền theo nhánh */
  const ordered=[],inFile=u=>raw.find(x=>x.user===u);
  let guard=0;
  while(ordered.length<raw.length&&guard++<raw.length+2){
    raw.forEach(it=>{
      if(ordered.includes(it))return;
      if(!it.parentUser){it._parentId=m.id;ordered.push(it);return}
      const ex=DB.units.find(x=>x.user===it.parentUser&&!x.deleted);
      if(ex){
        if(ex.id!==m.id&&!managedBy(ex,m.id)){errors.push("Dòng "+it.row+": đơn vị cha “"+it.parentUser+"” ngoài nhánh quản lý của bạn.");ordered.push(it);it._skip=true;return}
        it._parentId=ex.id;ordered.push(it);return}
      const pf=inFile(it.parentUser);
      if(!pf){errors.push("Dòng "+it.row+": không tìm thấy đơn vị cha “"+it.parentUser+"” (trên hệ thống lẫn trong file).");ordered.push(it);it._skip=true;return}
      if(ordered.includes(pf)&&!pf._skip){it._parentInFile=pf.user;ordered.push(it)}
      else if(pf._skip){ordered.push(it);it._skip=true;errors.push("Dòng "+it.row+": đơn vị cha ở dòng lỗi nên bị bỏ qua.")}});
  }
  return {items:ordered.filter(x=>!x._skip),errors};
}
async function importOrgFile(inp){
  const f=inp.files[0];inp.value="";if(!f)return;
  try{
    await loadXLSX();
    const buf=await f.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false});
    S.orgImport=parseOrgRows(rows);S.orgImport.done=false;
    render();
  }catch(e){toast("Không đọc được file: "+e.message)}
}

async function runOrgImport(){
  const oi=S.orgImport;if(!oi||!oi.items.length)return;
  const btn=document.getElementById("oi-run"),stEl=document.getElementById("oi-status");
  if(btn)btn.disabled=true;
  const idByUser={};let ok=0,fail=0;
  for(let i=0;i<oi.items.length;i++){
    const it=oi.items[i];
    if(stEl)stEl.textContent="Đang tạo "+(i+1)+"/"+oi.items.length+": "+it.user+"…";
    try{
      const parentId=it._parentInFile?idByUser[it._parentInFile]:it._parentId;
      if(!parentId)throw new Error("mất tham chiếu đơn vị cha");
      const pu=unit(parentId)||DB.units.find(x=>x.id===parentId);
      const nu={id:uid("u"),name:it.name,short:it.short,code:it.code,user:it.user,
        parent:parentId,level:((pu&&pu.level)||1)+1,anc:chainAnc({parent:parentId}),
        diachi:it.diachi,dienthoai:it.dienthoai,email:it.email};
      if(MODE==="local"){nu.pass=it.pass;DB.units.push(nu)}
      else{
        try{
          const sec=firebase.apps.find(a=>a.name==="sec")||firebase.initializeApp(FIREBASE_CONFIG,"sec");
          await sec.auth().createUserWithEmailAndPassword(it.user+"@"+LOGIN_DOMAIN,it.pass);
          await sec.auth().signOut();
        }catch(e){if(e.code!=="auth/email-already-in-use")throw e}
        const batch=FB.fs.batch();
        batch.set(FB.fs.collection("units").doc(nu.id),JSON.parse(JSON.stringify(nu)));
        batch.set(FB.fs.collection("userIndex").doc(nu.user),{unitId:nu.id});
        await batch.commit();
        if(!DB.units.some(x=>x.id===nu.id))DB.units.push(nu);
      }
      idByUser[it.user]=nu.id;ok++;
    }catch(e){fail++;oi.errors.push("Dòng "+it.row+" ("+it.user+"): "+e.message)}
  }
  if(MODE==="local")save();
  orgLog("Nhập đơn vị từ Excel","","Thành công "+ok+(fail?", lỗi "+fail:""));
  toast("Nhập xong: "+ok+" đơn vị"+(fail?", "+fail+" lỗi (xem chi tiết trong bảng).":"."));
  if(fail){if(btn)btn.disabled=false;if(stEl)stEl.textContent="";S.orgImport.items=[];render()}
  else{S.orgImport=null;render()}
}

function suggestUser(old){
  const mch=old.match(/^(.*?)(\d*)$/);const base=mch[1],num=mch[2]?parseInt(mch[2],10):1;
  let cand=base+(num+1);let g=0;
  while(DB.units.some(x=>x.user===cand)&&g++<20)cand=base+(num+2+g);
  return cand;
}

  if(nuser===u.user){toast("Cần một định danh MỚI khác định danh cũ (hạn chế của nền tảng miễn phí).");return}
  if(DB.units.some(x=>x.user===nuser)){toast("Tài khoản “"+nuser+"” đã được dùng.");return}
  if(npass.length<6){toast("Mật khẩu mới tối thiểu 6 ký tự.");return}
  if(!confirm("Cấp lại tài khoản cho "+u.name+"?\n\n• Đăng nhập mới: "+nuser+"\n• Tài khoản cũ ("+u.user+") vô hiệu ngay\n• Văn bản, truy vết giữ nguyên"))return;
  try{
    const sec=firebase.apps.find(a=>a.name==="sec")||firebase.initializeApp(FIREBASE_CONFIG,"sec");
    await sec.auth().createUserWithEmailAndPassword(nuser+"@"+LOGIN_DOMAIN,npass);
    await sec.auth().signOut();
  }catch(e){
    if(e.code!=="auth/email-already-in-use"){toast("Lỗi tạo tài khoản mới: "+e.message);return}
  }
  const olduser=u.user;u.user=nuser;u.anc=chainAnc(u);
  try{
    const batch=FB.fs.batch();
    batch.set(FB.fs.collection("units").doc(u.id),JSON.parse(JSON.stringify(u)));
    batch.delete(FB.fs.collection("userIndex").doc(olduser));
    batch.set(FB.fs.collection("userIndex").doc(nuser),{unitId:u.id});
    await batch.commit();
  }catch(e){u.user=olduser;toast("Lỗi cập nhật hệ thống: "+e.message);render();return}
  orgLog("Cấp lại mật khẩu",u.id,"tài khoản mới: "+nuser+" (cũ: "+olduser+")");
  toast("Xong. "+u.short+" đăng nhập bằng “"+nuser+"” với mật khẩu mới. Gợi ý: xóa tài khoản cũ "+olduser+" trên Firebase Console cho gọn.");
  S.orgEdit=null;render();
}

async function commitTarget(t){
  if(MODE==="local"){save();return}
  await FB.fs.collection("targets").doc(t.id).set(JSON.parse(JSON.stringify(t)));
}
async function giveTarget(){
  const m=me(),g=id=>{const el=document.getElementById(id);return el?el.value.trim():""};
  const uId=g("gt-unit"),ten=g("gt-ten"),so=parseInt(g("gt-so")||"0",10),dv=g("gt-dv"),ky=g("gt-ky")||("Năm "+new Date().getFullYear());
  const u=unit(uId);
  if(!u||!managedBy(u,m.id)){toast("Chỉ giao chỉ tiêu cho đơn vị trong nhánh quản lý.");return}
  if(!ten||!(so>0)){toast("Nhập tên chỉ tiêu và số giao (>0).");return}
  const t={id:uid("t"),from:m.id,unit:uId,ten,donvi:dv,giao:so,dat:0,ky,updated:todayISO(),logs:[]};
  (DB.targets=DB.targets||[]).push(t);
  try{await commitTarget(t)}catch(e){DB.targets.pop();friendlyErr(e,"chỉ tiêu");render();return}
  orgLog("Giao chỉ tiêu",uId,ten+": "+so+" "+(dv||"")+" ("+ky+")");
  toast("Đã giao “"+ten+"” cho "+u.short+".");render();
}
async function updateTarget(id){
  const t=(DB.targets||[]).find(x=>x.id===id);
  if(!t||t.unit!==DB.session){toast("Chỉ đơn vị được giao mới cập nhật kết quả.");return}
  const v=parseInt((document.getElementById("ut-"+id)||{}).value||"0",10);
  if(!(v>=0)){toast("Số liệu không hợp lệ.");return}
  const cu=t.dat;t.dat=v;t.updated=todayISO();
  (t.logs=t.logs||[]).push({time:todayISO(),dat:v,nguoi:memberLabel()});
  try{await commitTarget(t)}catch(e){t.dat=cu;toast("Lỗi lưu: "+e.message);return}
  orgLog("Cập nhật chỉ tiêu",t.from,t.ten+": đạt "+v+"/"+t.giao);
  toast("Đã cập nhật “"+t.ten+"”: "+v+"/"+t.giao+" ("+kpiPct(t)+"%).");render();
}
async function delTarget(id){
  const t=(DB.targets||[]).find(x=>x.id===id);
  if(!t||t.from!==DB.session){toast("Chỉ cấp giao được thu hồi chỉ tiêu.");return}
  if(!confirm("Thu hồi chỉ tiêu “"+t.ten+"” của "+((unit(t.unit)||{}).short||"?")+"?"))return;
  if(MODE==="cloud"){try{await FB.fs.collection("targets").doc(id).delete()}catch(e){toast("Lỗi: "+e.message);return}}
  DB.targets=DB.targets.filter(x=>x.id!==id);if(MODE==="local")save();
  orgLog("Thu hồi chỉ tiêu",t.unit,t.ten);toast("Đã thu hồi chỉ tiêu.");render();
}
function exportKpiCSV(){
  const m=me(),rows=[["BẢNG KPI CHỈ TIÊU — "+m.name],[],["Đơn vị","Chỉ tiêu","Kỳ","Giao","Đạt","KPI (%)","Cập nhật"]];

  exportCSV(rows,"kpi-chi-tieu-"+m.code+".csv");
}

}

  </div></div>
  <div class="card"><div class="card-h"><h3>OCR — Trích xuất chữ từ ảnh scan (tiếng Việt)</h3></div><div class="card-b">
    <div class="small muted" style="margin-bottom:10px">Chọn ảnh chụp/scan công văn (JPG/PNG). Toàn bộ nhận dạng chạy ngay trên máy bạn (Tesseract.js) — không gửi đi đâu, miễn phí. Lần đầu sẽ tải bộ nhận dạng tiếng Việt (~vài chục giây).</div>
    <input type="file" accept="image/*" onchange="ocrPickFile(this)">
    <div class="small" id="ocr-status" style="margin:8px 0;color:var(--warn)"></div>
    <textarea id="ocr-out" rows="8" style="width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:.85rem" placeholder="Kết quả OCR hiện tại đây — sao chép vào văn bản hoặc dùng để tìm kiếm."></textarea>
  </div></div>`;
}
/* ---------- OCR engine (nạp Tesseract.js khi cần) ---------- */
function loadTesseract(){
  if(typeof Tesseract!=="undefined")return Promise.resolve();
  return new Promise((res,rej)=>{
    const sc=document.createElement("script");
    sc.src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js";
    sc.onload=res;sc.onerror=()=>rej(new Error("Không tải được Tesseract.js — cần kết nối mạng."));
    document.head.appendChild(sc);});
}
async function runOCR(imgSrc,statusEl){
  const st=t=>{if(statusEl)statusEl.textContent=t};
  st("Đang nạp bộ nhận dạng…");
  await loadTesseract();
  const r=await Tesseract.recognize(imgSrc,"vie",{logger:m=>{
    if(m.status==="recognizing text")st("Đang nhận dạng… "+Math.round((m.progress||0)*100)+"%");
    else st(m.status||"…");}});
  st("");return (r.data.text||"").trim();
}
function ocrPickFile(inp){
  const f=inp.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=async()=>{
    const stEl=document.getElementById("ocr-status"),out=document.getElementById("ocr-out");
    try{const text=await runOCR(rd.result,stEl);out.value=text;toast("OCR xong: "+text.length+" ký tự.")}
    catch(e){if(stEl)stEl.textContent="";toast("Lỗi OCR: "+e.message)}};
  rd.readAsDataURL(f);
}
async function ocrDoc(id){
  const d=DB.docs.find(x=>x.id===id);
  const imgF=d?docFiles(d).find(f=>f.dataUrl&&f.dataUrl.startsWith("data:image")):null;
  if(!imgF){toast("Chỉ OCR được tệp ảnh lưu kèm văn bản.");return}
  const stEl=document.getElementById("ocr-doc-status");
  try{
    const text=await runOCR(imgF.dataUrl,stEl);
    d.ocrText=text;audit(d,"OCR trích xuất nội dung",text.length+" ký tự");
    commit(d);if(MODE==="local")save();
    toast("Đã OCR và lập chỉ mục tìm kiếm ("+text.length+" ký tự).");render();
  }catch(e){if(stEl)stEl.textContent="";toast("Lỗi OCR: "+e.message)}
}

/* ============ GIAI ĐOẠN 3.0 — TRỢ LÝ AI (kiến trúc plugin) ============ */
/* Nhà cung cấp mặc định: Google Gemini (gói miễn phí). Khóa API lưu CỤC BỘ
   trên máy này (localStorage), không đưa lên Firestore. Đổi nhà cung cấp:
   chỉ cần thay hàm aiCall — đúng nguyên tắc AI Module độc lập. */
function aiKey(){try{return localStorage.getItem("do_ai_key")||""}catch(e){return ""}}
function setAiKey(){
  const v=(document.getElementById("ai-key")||{}).value||"";
  try{if(v.trim())localStorage.setItem("do_ai_key",v.trim());else localStorage.removeItem("do_ai_key")}catch(e){}
  toast(v.trim()?"Đã lưu khóa AI trên máy này.":"Đã gỡ khóa AI.");render();
}
const AI_FREE_LIMIT=1500; /* hạn mức miễn phí THAM KHẢO của Gemini Flash (lượt/ngày) — Google không có API tra hạn mức còn lại */
function aiUseCount(){try{return parseInt(localStorage.getItem("do_ai_use_"+todayISO())||"0",10)}catch(e){return 0}}
function bumpAiUse(){try{
  const n=aiUseCount()+1;localStorage.setItem("do_ai_use_"+todayISO(),String(n));
  if(n===Math.ceil(AI_FREE_LIMIT*0.8))toast("⚠ Đã dùng ~80% hạn mức AI miễn phí ước tính trong ngày ("+n+"/"+AI_FREE_LIMIT+").");
}catch(e){}}
async function aiCall(prompt){
  const key=aiKey();
  if(!key)throw new Error("NOKEY");
  const r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+encodeURIComponent(key),{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.4,maxOutputTokens:1400}})});
  if(r.status===429){throw new Error("Khóa này đã chạm hạn mức miễn phí trong ngày (HTTP 429). Chờ sang ngày hoặc dùng khóa khác.")}
  if(!r.ok){throw new Error("AI API lỗi "+r.status+(r.status===400||r.status===403?" — kiểm tra lại khóa API":""))}
  bumpAiUse();
  const j=await r.json();
  const c=(j.candidates||[])[0];
  return ((c&&c.content&&c.content.parts)||[]).map(x=>x.text||"").join("").trim();
}
async function testAi(){
  const out=document.getElementById("ai-test-out");
  const v=(document.getElementById("ai-key")||{}).value||"";
  if(v.trim()&&v.trim()!==aiKey()){try{localStorage.setItem("do_ai_key",v.trim())}catch(e){}}
  if(!aiKey()){if(out)out.innerHTML='<span style="color:var(--danger)">Chưa có khóa — dán khóa rồi bấm kiểm tra.</span>';return}
  if(out)out.innerHTML='<span style="color:var(--warn)">Đang gọi thử Gemini…</span>';
  try{
    const t=await aiCall("Trả lời ngắn gọn đúng một câu tiếng Việt xác nhận kết nối thành công.");
    if(out)out.innerHTML='<span style="color:var(--ok)">✔ Khóa hoạt động.</span> AI trả lời: <i>'+esc(t.slice(0,120))+'</i> · Đã dùng <b>'+aiUseCount()+'</b> lượt hôm nay (máy này).';
    render();
  }catch(e){if(out)out.innerHTML='<span style="color:var(--danger)">✕ '+esc(e.message)+'</span>'}
}

    <div class="hint" style="margin-top:8px">Tệp nằm trên Google Drive (15GB miễn phí/tài khoản) — kho chỉ lưu liên kết nên nhẹ và không tốn hạn mức Firestore.</div>
  </div></div></div>`;
}
async function addLibItem(){
  const m=me(),g=id=>{const el=document.getElementById(id);return el?el.value.trim():""};
  const ten=g("lb-ten"),link=g("lb-link");
  if(!ten||!link){toast("Nhập tên tài liệu và liên kết Drive.");return}
  const x={id:uid("lb"),from:m.id,ten,cat:g("lb-cat")||"khac",link,note:g("lb-note"),time:todayISO(),
    shareTo:[...document.querySelectorAll(".lb-cb:checked")].map(c=>c.value)};
  (DB.library=DB.library||[]).push(x);
  if(MODE==="local"){save()}
  else{try{await FB.fs.collection("library").doc(x.id).set(JSON.parse(JSON.stringify(x)))}
    catch(e){DB.library.pop();friendlyErr(e,"tài liệu");render();return}}
  orgLog("Thêm tài liệu vào kho","",ten+(x.shareTo.length?" (chia sẻ "+x.shareTo.length+" đơn vị)":""));
  toast("Đã đưa “"+ten+"” vào kho.");render();
}
async function delLibItem(id){
  const x=(DB.library||[]).find(t=>t.id===id);
  if(!x||x.from!==DB.session)return;
  if(!confirm("Gỡ “"+x.ten+"” khỏi kho? (Tệp trên Drive không bị xóa)"))return;
  if(MODE==="cloud"){try{await FB.fs.collection("library").doc(id).delete()}catch(e){toast("Lỗi: "+e.message);return}}
  DB.library=DB.library.filter(t=>t.id!==id);if(MODE==="local")save();
  toast("Đã gỡ khỏi kho.");render();
}

/* =================== HẠ TẦNG CLOUD (Firebase) =================== */
async function boot(){
  if(MODE==="local"){load();render();return}
  document.getElementById("app").innerHTML='<div class="login-wrap"><div class="login-card" style="text-align:center"><div class="login-star" style="color:var(--gold)">'+STAR+'</div><h1>DoanOffice</h1><div class="sub">Đang kết nối máy chủ đồng bộ…</div></div></div>';
  try{await loadFirebaseSDK()}catch(e){
    document.getElementById("app").innerHTML='<div class="login-wrap"><div class="login-card"><h1>Không tải được Firebase</h1><div class="sub">Kiểm tra kết nối mạng rồi tải lại trang.</div></div></div>';return}
  firebase.initializeApp(FIREBASE_CONFIG);
  FB.auth=firebase.auth();FB.fs=firebase.firestore();
  try{await FB.fs.enablePersistence({synchronizeTabs:true})}catch(e){/* nhiều tab/trình duyệt cũ: vẫn chạy, chỉ mất cache offline */}
  DB={session:null,units:[],docs:[],seq:{}};
  FB.auth.onAuthStateChanged(async u=>{
    FB.unsub.forEach(f=>f());FB.unsub=[];
    if(!u){DB.session=null;DB.docs=[];render();return}
    await cloudAfterLogin(u);
  });
}
function loadFirebaseSDK(){
  const urls=["https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js",
    "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js",
    "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"];
  return urls.reduce((p,u)=>p.then(()=>new Promise((res,rej)=>{
    const s=document.createElement("script");s.src=u;s.onload=res;
    s.onerror=()=>rej(new Error("Không tải được "+u));document.head.appendChild(s)})),Promise.resolve());
}
async function cloudAfterLogin(user){
  const uname=(user.email||"").split("@")[0];
  let snap;
  try{snap=await FB.fs.collection("units").get()}
  catch(e){toast("Không đọc được danh sách đơn vị: "+e.message);return}
  DB.units=snap.docs.map(d=>({id:d.id,...d.data()}));
  const mine=DB.units.find(x=>x.user===uname);
  if(!mine){S.view="setup";S.setupUser=uname;render();return}  /* hệ thống chưa khởi tạo hoặc tài khoản chưa gắn đơn vị */
  if(mine.deleted){
    document.getElementById("app").innerHTML='<div class="login-wrap"><div class="login-card"><h1 style="text-align:center">Đơn vị đã bị khóa</h1><div class="sub">'+esc(mine.name)+' đã bị khóa bởi đơn vị cấp trên trực tiếp. Liên hệ cấp trên để được khôi phục.</div><button class="btn btn-primary btn-block" onclick="logout()">Quay lại đăng nhập</button></div></div>';
    return;
  }
  DB.session=mine.id;S.view="dashboard";
  S.memberId=localStorage.getItem("do_mem_"+mine.id)||null;
  ensureReminderSeed();
  try{if(!sessionStorage.getItem("do_lg")){orgLog("Đăng nhập");sessionStorage.setItem("do_lg","1")}}catch(e){}
  FB.unsub.push(FB.fs.collection("units").onSnapshot(s=>{
    DB.units=s.docs.map(d=>({id:d.id,...d.data()}));liveRender()}));
  const apply=s=>{s.docChanges().forEach(ch=>{
      const d={id:ch.doc.id,...ch.doc.data()};
      const i=DB.docs.findIndex(x=>x.id===d.id);
      if(ch.type==="removed"){if(i>=0)DB.docs.splice(i,1)}
      else if(i>=0)DB.docs[i]=d;else DB.docs.push(d)});
    liveRender()};
  FB.unsub.push(FB.fs.collection("docs").where("recipIds","array-contains",mine.id).onSnapshot(apply,e=>toast("Lỗi đồng bộ VB đến: "+e.message)));
  FB.unsub.push(FB.fs.collection("docs").where("from","==",mine.id).onSnapshot(apply,e=>toast("Lỗi đồng bộ VB đi: "+e.message)));
  DB.targets=DB.targets||[];DB.events=DB.events||[];DB.periodic=DB.periodic||[];
  const applyCol=(arr)=>s2=>{s2.docChanges().forEach(ch=>{
      const d={id:ch.doc.id,...ch.doc.data()};
      const i=arr.findIndex(x=>x.id===d.id);
      if(ch.type==="removed"){if(i>=0)arr.splice(i,1)}
      else if(i>=0)arr[i]=d;else arr.push(d)});
    liveRender()};
  FB.unsub.push(FB.fs.collection("targets").where("from","==",mine.id).onSnapshot(applyCol(DB.targets),()=>{}));
  FB.unsub.push(FB.fs.collection("targets").where("unit","==",mine.id).onSnapshot(applyCol(DB.targets),()=>{}));
  FB.unsub.push(FB.fs.collection("events").where("from","==",mine.id).onSnapshot(applyCol(DB.events),()=>{}));
  FB.unsub.push(FB.fs.collection("events").where("moi","array-contains",mine.id).onSnapshot(applyCol(DB.events),()=>{}));
  FB.unsub.push(FB.fs.collection("periodic").where("from","==",mine.id).onSnapshot(applyCol(DB.periodic),()=>{}));
  FB.unsub.push(FB.fs.collection("periodic").where("recipIds","array-contains",mine.id).onSnapshot(applyCol(DB.periodic),()=>{}));
  DB.reports=DB.reports||[];DB.reminders=DB.reminders||[];
  /* Mẫu báo cáo dùng chung: đơn vị nào cũng đọc để dùng làm khung; sửa/tạo do từng đơn vị */
  FB.unsub.push(FB.fs.collection("reportTemplates").onSnapshot(applyCol(DB.reports),()=>{}));
  /* Lịch nhắc: của riêng đơn vị (from) */
  FB.unsub.push(FB.fs.collection("reminders").where("from","==",mine.id).onSnapshot(applyCol(DB.reminders),()=>{ensureReminderSeed()}));
  DB.library=DB.library||[];
  FB.unsub.push(FB.fs.collection("library").where("from","==",mine.id).onSnapshot(applyCol(DB.library),()=>{}));
  FB.unsub.push(FB.fs.collection("library").where("shareTo","array-contains",mine.id).onSnapshot(applyCol(DB.library),()=>{}));
  render();
}

async function initUnits(){

async function getQRDataUrl(text){
  try{

      await new Promise((res,rej)=>{const sc=document.createElement("script");
        sc.src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
        sc.onload=res;sc.onerror=rej;document.head.appendChild(sc)});}
    const tmp=document.createElement("div");tmp.style.cssText="position:fixed;left:-9999px";
    document.body.appendChild(tmp);
    new QRCode(tmp,{text,width:104,height:104,correctLevel:QRCode.CorrectLevel.M});
    const cv=tmp.querySelector("canvas");const src=cv?cv.toDataURL("image/png"):(tmp.querySelector("img")||{}).src||"";
    document.body.removeChild(tmp);return src;
  }catch(e){return ""}
}
