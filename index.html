/* ========== v4.0 · GIAI ĐOẠN 2: BÁO CÁO ĐỊNH KỲ & BIỂU MẪU SỐ LIỆU TỰ TỔNG HỢP ==========
   Cấp trên tạo "đợt báo cáo" (kỳ: tháng/quý/6 tháng/năm) kèm biểu mẫu gồm các chỉ tiêu
   số liệu. Gửi xuống các đơn vị trong nhánh. Mỗi đơn vị nhập số liệu của mình; hệ thống
   TỰ TỔNG HỢP (cộng dồn theo cây đơn vị) lên cấp trên theo thời gian thực. Xuất Word/CSV.
   Lưu ở collection "periodic" riêng để không đụng trần 1MB của document văn bản. */
const PKY={thang:"Tháng",quy:"Quý",sauthang:"6 tháng",nam:"Năm"};
/* Cách gộp số liệu khi tổng hợp theo THỜI GIAN (tháng→quý→năm):
   sum  = cộng dồn (chỉ tiêu phát sinh trong kỳ: kết nạp mới, số buổi…)
   last = lấy giá trị KỲ CUỐI (chỉ tiêu tồn/hiện có: tổng số đoàn viên…)
   avg  = trung bình các kỳ con (tỷ lệ %…) */
const AGG={sum:"Cộng dồn",last:"Cuối kỳ",avg:"Trung bình"};
/* Quan hệ kỳ con → kỳ cha trong một chương trình năm */
const QUY_OF_THANG={1:"Q1",2:"Q1",3:"Q1",4:"Q2",5:"Q2",6:"Q2",7:"Q3",8:"Q3",9:"Q3",10:"Q4",11:"Q4",12:"Q4"};
const THANG_OF_QUY={Q1:[1,2,3],Q2:[4,5,6],Q3:[7,8,9],Q4:[10,11,12]};
const QUY_ROMAN={Q1:"I",Q2:"II",Q3:"III",Q4:"IV"};
/* Mốc hạn nộp mặc định theo Công văn 76 (ngày trong tháng kết thúc kỳ) */
function defaultHan(ky,y,idx){
  const p2=n=>String(n).padStart(2,"0");
  if(ky==="thang")return y+"-"+p2(idx)+"-23";            /* idx = tháng 1..12, hạn 23 */
  if(ky==="quy"){const endM={Q1:3,Q2:6,Q3:9,Q4:12}[idx];return y+"-"+p2(endM)+"-21"}
  if(ky==="nam")return y+"-11-23";
  return y+"-12-31";
}
function periodicMine(){return (DB.periodic||[]).filter(p=>p.from===DB.session)}
function periodicAssigned(){return (DB.periodic||[]).filter(p=>(p.recipIds||[]).includes(DB.session))}
/* Các đợt cùng một chương trình năm */
function periodsOfCampaign(cid){return (DB.periodic||[]).filter(p=>p.campaignId===cid)}
function periodByKey(cid,periodKey){return (DB.periodic||[]).find(p=>p.campaignId===cid&&p.periodKey===periodKey)}
/* Tổng hợp theo THỜI GIAN: gộp giá trị của một đơn vị qua các kỳ con.
   Trả {values:{key:val}, meta} theo agg từng field. */
function aggregateOverPeriods(childPeriods,fields,unitId){
  const out={},meta={};
  /* Giá trị của một kỳ con: nếu kỳ con cũng là dẫn xuất thì đệ quy (năm←quý←tháng) */
  const childVal=(cp)=>periodValuesForUnit(cp,unitId);
  const cache=childPeriods.map(cp=>({cp,pv:childVal(cp)}));
  fields.forEach(f=>{
    const vals=[];
    cache.forEach(({cp,pv})=>{
      if(pv.filled>0)vals.push({k:cp.periodKey,v:Number(pv.values[f.key]||0)});
    });
    const nums=vals.map(x=>x.v);
    let val=0;
    if(!nums.length)val=0;
    else if(f.agg==="last")val=nums[nums.length-1];
    else if(f.agg==="avg")val=Math.round(nums.reduce((a,b)=>a+b,0)/nums.length);
    else val=nums.reduce((a,b)=>a+b,0); /* sum mặc định */
    out[f.key]=val;meta[f.key]=vals;
  });
  return {values:out,meta};
}
function periodicDueCount(){
  if(!DB||!DB.session)return 0;
  return periodicAssigned().filter(p=>{const e=(p.entries||{})[DB.session];return !e||!e.submitted}).length;
}
async function commitPeriodic(p){
  if(MODE==="local"){save();return}
  await FB.fs.collection("periodic").doc(p.id).set(JSON.parse(JSON.stringify(p)));
}
/* Tổng hợp số liệu: cộng dồn số của đơn vị u + toàn bộ hậu duệ đã nộp */
function periodicRollup(p,unitId){
  const acc={};(p.fields||[]).forEach(f=>acc[f.key]=0);
  const ids=[unitId,...DB.units.filter(x=>managedBy(x,unitId)).map(x=>x.id)];
  let filled=0,expected=0;
  (p.recipIds||[]).forEach(rid=>{
    if(!ids.includes(rid)&&rid!==unitId)return;
    expected++;
    const e=(p.entries||{})[rid];
    if(e&&e.submitted){filled++;(p.fields||[]).forEach(f=>{acc[f.key]+=Number(e.values&&e.values[f.key]||0)})}
  });
  return {acc,filled,expected};
}

/* Phân tích chỉ tiêu: "Tên | đơn vị | agg"  (agg: sum|last|avg, mặc định sum) */
function parseFields(raw){
  return (raw||"").split(/\n+/).map(t=>t.trim()).filter(Boolean).map((t,i)=>{
    const p2=t.split("|");
    let agg=(p2[2]||"").trim().toLowerCase();
    if(!["sum","last","avg"].includes(agg)){
      /* đoán theo tên: có "tổng số/hiện có/số lượng đang" → last */
      const nm=(p2[0]||"").toLowerCase();
      agg=/(tổng số|hiện có|đang quản lý|tính đến|lũy kế đến)/.test(nm)?"last":"sum";
    }
    return {key:"f"+i,name:(p2[0]||"").trim(),unit:(p2[1]||"").trim(),agg}}).filter(f=>f.name);
}

}
/* PHÁT ĐỘNG CHƯƠNG TRÌNH BÁO CÁO CẢ NĂM — tự sinh 12 tháng + 4 quý + 1 năm,
   liên kết qua campaignId + periodKey. Quý tự cộng từ 3 tháng, năm từ 4 quý. */
async function createCampaign(){
  const m=me(),g=id=>{const el=document.getElementById(id);return el?el.value.trim():""};
  const ten=g("cp-ten"),year=Number(g("cp-year")||new Date().getFullYear());
  if(!ten){toast("Nhập tên chương trình báo cáo.");return}
  const fields=parseFields(g("cp-fields"));
  if(!fields.length){toast("Khai ít nhất một chỉ tiêu số liệu.");return}
  const recipIds=[...document.querySelectorAll(".cp-cb:checked")].map(c=>c.value);
  if(!recipIds.length){toast("Chọn đơn vị phải báo cáo.");return}
  const genThang=(document.getElementById("cp-gen-thang")||{}).checked;
  const genQuy=(document.getElementById("cp-gen-quy")||{}).checked;
  const genNam=(document.getElementById("cp-gen-nam")||{}).checked;
  if(!genThang&&!genQuy&&!genNam){toast("Chọn ít nhất một cấp kỳ để sinh (tháng/quý/năm).");return}
  const cid=uid("camp");const created=[];const rom=["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];
  const mk=(ky,periodKey,kylabel,han,derived)=>{
    const p={id:uid("pk"),from:m.id,campaignId:cid,campaignName:ten,year,ky,periodKey,kylabel,han,
      fields:JSON.parse(JSON.stringify(fields)),recipIds:[...recipIds],entries:{},derived:!!derived,created:todayISO()};
    created.push(p);return p;
  };
  if(genThang)for(let mo=1;mo<=12;mo++)mk("thang",year+"-"+String(mo).padStart(2,"0"),"Tháng "+mo+"/"+year,defaultHan("thang",year,mo),false);
  if(genQuy)["Q1","Q2","Q3","Q4"].forEach(q=>mk("quy",year+"-"+q,"Quý "+QUY_ROMAN[q]+"/"+year,defaultHan("quy",year,q),genThang));
  if(genNam)mk("nam",year+"-Y","Năm "+year,defaultHan("nam",year,null),genQuy||genThang);
  (DB.periodic=DB.periodic||[]).push(...created);
  try{for(const p of created)await commitPeriodic(p);}
  catch(e){created.forEach(p=>{DB.periodic=DB.periodic.filter(x=>x.id!==p.id)});friendlyErr(e,"chương trình báo cáo");render();return}
  orgLog("Phát động chương trình báo cáo năm","",ten+" "+year+" → "+created.length+" kỳ, "+recipIds.length+" đơn vị");
  notifyPeriodicRecips(recipIds,m,ten+" (năm "+year+")",defaultHan("thang",year,new Date().getMonth()+1));
  toast("Đã tạo chương trình “"+ten+"” năm "+year+": "+created.length+" kỳ liên kết.");
  S.pkCampaign=cid;render();
}

/* Danh sách mẫu khả dụng = mẫu chuẩn (đã có sẵn) + mẫu do đơn vị tạo (DB.reports) */
function allTemplates(){
  const custom=(DB.reports||[]);
  /* mẫu tùy biến của đơn vị mình hoặc chia sẻ toàn hệ thống */
  const mine=custom.filter(t=>!t.from||t.from===DB.session||t.shared);
  return [...REPORT_TEMPLATES_BUILTIN, ...mine];
}
function findTemplate(id){return allTemplates().find(t=>t.id===id)||REPORT_TEMPLATES_BUILTIN.find(t=>t.id===id)}
/* Thay biến trong chuỗi mẫu */
function fillVars(s,ctx){return (s||"").replace(/\{tenDonVi\}/g,ctx.tenDonVi).replace(/\{ky\}/g,ctx.ky).replace(/\{capTren\}/g,ctx.capTren).replace(/\{ngay\}/g,ctx.ngay)}
/* Giá trị số liệu của một kỳ cho đơn vị hiện tại.
   - kỳ nhập trực tiếp: cộng dồn nhánh (periodicRollup)
   - kỳ dẫn xuất (quý/năm): tự tổng hợp theo thời gian từ các kỳ con */
function periodValuesForUnit(p,unitId){
  if(!p.derived){const ro=periodicRollup(p,unitId);return {values:ro.acc,filled:ro.filled}}
  let childKeys=[];
  if(p.ky==="quy"){const q=p.periodKey.split("-")[1];childKeys=THANG_OF_QUY[q].map(mm=>p.year+"-"+String(mm).padStart(2,"0"))}
  else if(p.ky==="nam"){childKeys=["Q1","Q2","Q3","Q4"].map(q=>p.year+"-"+q)}
  const children=childKeys.map(k=>periodByKey(p.campaignId,k)).filter(Boolean);
  const agg=aggregateOverPeriods(children,p.fields||[],unitId);
  const filled=children.some(c=>periodicRollup(c,unitId).filled>0)?1:0;
  return {values:agg.values,filled};
}
/* Lấy số liệu Báo cáo định kỳ mà đơn vị đã nộp/tổng hợp — để auto-fill mẫu.
   Nếu seedId chỉ định (từ nút "Đổ vào mẫu"), ưu tiên đúng kỳ đó lên đầu. */
function autoNumbersForUnit(seedId){
  const m=me();const out=[];
  (DB.periodic||[]).forEach(p=>{
    const involved=(p.recipIds||[]).includes(m.id)||p.from===m.id;
    if(!involved)return;
    const pv=periodValuesForUnit(p,m.id);
    const anyData=(p.fields||[]).some(f=>(pv.values[f.key]||0)>0);
    if(!anyData&&p.id!==seedId)return;
    const label=(p.campaignName?p.campaignName+" · ":"")+(p.kylabel||PKY[p.ky]||p.ky)+(p.derived?" (tự tổng hợp)":"");
    out.push({id:p.id,ten:p.campaignName||p.ten,ky:label,seed:p.id===seedId,
      rows:(p.fields||[]).map(f=>({name:f.name,unit:f.unit||"",val:pv.values[f.key]||0}))});
  });
  /* đưa kỳ được chỉ định lên đầu */
  out.sort((a,b)=>(b.seed?1:0)-(a.seed?1:0));
  return out;
}
/* Nút "Đổ vào mẫu báo cáo" từ một kỳ định kỳ → mở view mẫu, ghim số liệu kỳ đó */
function reportFromPeriod(pid){
  const p=(DB.periodic||[]).find(x=>x.id===pid);if(!p)return;
  S.reportSeedPeriod=pid;
  /* gợi ý mẫu & kỳ theo loại kỳ */

  toast("Đã chuyển sang Mẫu báo cáo — số liệu kỳ “"+(p.kylabel||p.ten)+"” đã sẵn để chèn.");
}

/* Thu thập nội dung người dùng đã nhập cho từng block */
function collectReport(tpl){
  const m=me(),g=id=>{const el=document.getElementById(id);return el?el.value.trim():""};
  const ky=g("rp-ky")||"";const capTren=g("rp-capTren")||(m.parent?(unit(m.parent)||{}).name:"");
  const ctx={tenDonVi:m.name,ky,capTren,ngay:new Date().getDate()+"/"+(new Date().getMonth()+1)+"/"+new Date().getFullYear()};
  const useAuto=(document.getElementById("rp-useauto")||{}).checked;
  const autos=useAuto?autoNumbersForUnit(S.reportSeedPeriod):[];
  const parts=[];
  tpl.blocks.forEach((b,i)=>{
    if(b.t==="h"){parts.push({t:"h",v:b.v});}
    else if(b.t==="txt"){parts.push({t:"p",v:fillVars(b.v,ctx)});}
    else if(b.t==="auto"){parts.push({t:"auto",v:b.v,autos});}
    else{const val=g("rp-b"+i);parts.push({t:"sec",label:b.v,v:val});}
  });
  return {ky,capTren,ctx,parts,autos};
}
/* Kết xuất báo cáo thành text thuần (để lưu vào văn bản điện tử) */
function reportPlainText(tpl,data){
  const L=[];
  L.push("Kính gửi: "+data.capTren);L.push("");
  data.parts.forEach(pt=>{
    if(pt.t==="h"){L.push("");L.push(pt.v);}
    else if(pt.t==="p"){L.push(pt.v);}
    else if(pt.t==="sec"){if(pt.label)L.push(pt.label);if(pt.v)L.push(pt.v);L.push("");}
    else if(pt.t==="auto"){
      L.push("SỐ LIỆU CHỦ YẾU:");
      if(pt.autos&&pt.autos.length){pt.autos.forEach(a=>{a.rows.forEach(r=>L.push("- "+r.name+": "+r.val.toLocaleString("vi-VN")+" "+r.unit));});}
      else L.push("(chưa có số liệu định kỳ)");
      L.push("");
    }
  });
  return L.join("\n").replace(/\n{3,}/g,"\n\n").trim();
}

    else{d.docStatus="trinhduyet";audit(d,"Trình duyệt","Trình Thường trực phê duyệt, phát hành báo cáo");await persistNew(d);

async function createTemplate(){
  const m=me(),g=id=>{const el=document.getElementById(id);return el?el.value.trim():""};
  const ten=g("rt-ten");if(!ten){toast("Nhập tên mẫu.");return}
  const raw=g("rt-blocks");if(!raw){toast("Khai khung nội dung cho mẫu.");return}
  const blocks=raw.split(/\n+/).map(l=>l.trim()).filter(Boolean).map(l=>{
    const c=l[0];const rest=l.slice(1).trim();
    if(c==="#")return {t:"h",v:rest};
    if(c==="=")return {t:"txt",v:rest};
    if(c==="$")return {t:"auto",v:rest||"Số liệu chủ yếu"};
    if(c==="?")return {t:"sec",v:rest,ph:"Nhập nội dung…"};
    return {t:"sec",v:l,ph:"Nhập nội dung…"};
  });
  const tpl={id:uid("tpl"),from:m.id,ten,moTa:g("rt-mota"),tenBC:g("rt-tenbc")||"BÁO CÁO {ky}",
    loai:"baocao",shared:(document.getElementById("rt-shared")||{}).checked||false,blocks,created:todayISO()};
  (DB.reports=DB.reports||[]).push(tpl);
  try{if(MODE==="cloud"){await FB.fs.collection("reportTemplates").doc(tpl.id).set(JSON.parse(JSON.stringify(tpl)))}else save();}
  catch(e){DB.reports.pop();friendlyErr(e,"mẫu báo cáo");render();return}
  orgLog("Tạo mẫu báo cáo","",ten);toast("Đã lưu mẫu “"+ten+"”.");render();
}
async function delTemplate(id){
  const t=(DB.reports||[]).find(x=>x.id===id);if(!t||t.from!==DB.session){toast("Chỉ xóa được mẫu do đơn vị mình tạo.");return}
  if(!confirm("Xóa mẫu “"+t.ten+"”?"))return;
  if(MODE==="cloud"){try{await FB.fs.collection("reportTemplates").doc(id).delete()}catch(e){toast("Lỗi: "+e.message);return}}
  DB.reports=DB.reports.filter(x=>x.id!==id);if(MODE==="local")save();
  toast("Đã xóa mẫu.");render();
}

const CV76_SEED=[
  {key:"cv76_ctd_thang", ten:"Báo cáo công tác Đoàn & PTTN — THÁNG", note:"Chậm nhất ngày 23 hằng tháng (mốc: 21 tháng trước → 20 tháng này). CV76 khoản 1.", cycle:"monthly", dueDay:23, lead:2, tplId:"tpl_ctd_pttn"},

  if(r&&r.tplId){S.rpSel=r.tplId;S.rpTab="soan";

/* Tính hạn kế tiếp cho một reminder dựa trên hôm nay */
function nextDue(r){
  if(r.next)return r.next; /* nếu đã ấn định cụ thể */
  const t=new Date();t.setHours(0,0,0,0);
  const y=t.getFullYear(),mo=t.getMonth();
  const mk=(yy,mm,dd)=>{const d=new Date(yy,mm,dd);return iso(d.getTime());};
  const dd=r.dueDay||1;
  if(r.cycle==="daily"){return iso(t.getTime());}
  if(r.cycle==="monthly"){
    let cand=mk(y,mo,dd);if(cand<iso(t.getTime()))cand=mk(y,mo+1,dd);return cand;}
  if(r.cycle==="quarterly"){
    /* mốc quý: các tháng 3,6,9,12 (index 2,5,8,11) */
    const qm=[2,5,8,11];for(const mm of qm){const cand=mk(y,mm,dd);if(cand>=iso(t.getTime()))return cand;}return mk(y+1,2,dd);}
  if(r.cycle==="yearly"){
    const mm=(r.dueMonth||1)-1;let cand=mk(y,mm,dd);if(cand<iso(t.getTime()))cand=mk(y+1,mm,dd);return cand;}
  return r.next||iso(t.getTime());
}
function reminderList(){return (DB.reminders||[]).filter(r=>r.from===DB.session)}
/* Đếm số lịch sắp đến hạn trong ngưỡng cảnh báo (để hiện badge) */
function reminderDueCount(){
  if(!DB||!DB.session)return 0;const today=todayISO();
  return reminderList().filter(r=>{if(r.off)return false;const nd=nextDue(r);
    const diff=(new Date(nd)-new Date(today))/86400000;return diff>=0&&diff<=(r.lead||2);}).length;
}
/* Nạp sẵn lịch CV76 lần đầu cho đơn vị (chỉ khi chưa có reminder nào của họ) */
function ensureReminderSeed(){
  if(!DB||!DB.session)return;
  if((DB.reminders||[]).some(r=>r.from===DB.session))return; /* đã có → không nạp lại */
  if(sessionStorage.getItem("do_rmd_seed_"+DB.session))return;
  sessionStorage.setItem("do_rmd_seed_"+DB.session,"1");
  const m=me();if(!m)return;
  CV76_SEED.forEach(s=>{
    const r={id:uid("rmd"),from:m.id,seedKey:s.key,ten:s.ten,note:s.note,cycle:s.cycle,
      dueDay:s.dueDay,dueMonth:s.dueMonth,off:false,lead:s.lead||2,builtin:true,tplId:s.tplId||null,created:todayISO()};
    (DB.reminders=DB.reminders||[]).push(r);
    if(MODE==="cloud"){FB.fs.collection("reminders").doc(r.id).set(JSON.parse(JSON.stringify(r))).catch(()=>{})}
  });
  if(MODE==="local")save();
}

function rmCycleUI(){
  const c=(document.getElementById("rm-cycle")||{}).value;
  const dayWrap=document.getElementById("rm-day-wrap"),dateWrap=document.getElementById("rm-date-wrap"),monthWrap=document.getElementById("rm-month-wrap");
  if(!dayWrap)return;
  if(c==="none"){dayWrap.style.display="none";dateWrap.style.display="";}
  else if(c==="daily"){dayWrap.style.display="none";dateWrap.style.display="none";}
  else{dayWrap.style.display="";dateWrap.style.display="none";monthWrap.style.display=(c==="yearly")?"":"none";}
}
async function createReminder(){
  const m=me(),g=id=>{const el=document.getElementById(id);return el?el.value.trim():""};
  const ten=g("rm-ten");if(!ten){toast("Nhập tên lịch nhắc.");return}
  const cycle=g("rm-cycle")||"monthly";
  const r={id:uid("rmd"),from:m.id,ten,note:g("rm-note"),cycle,lead:Number(g("rm-lead")||2),off:false,builtin:false,tplId:g("rm-tpl")||null,created:todayISO()};
  if(cycle==="none"){r.next=g("rm-date")||todayISO();}
  else if(cycle!=="daily"){r.dueDay=Number(g("rm-dueday")||1);if(cycle==="yearly")r.dueMonth=Number(g("rm-duemonth")||1);}
  (DB.reminders=DB.reminders||[]).push(r);
  try{if(MODE==="cloud"){await FB.fs.collection("reminders").doc(r.id).set(JSON.parse(JSON.stringify(r)))}else save();}
  catch(e){DB.reminders.pop();friendlyErr(e,"lịch nhắc");render();return}
  orgLog("Tạo lịch nhắc báo cáo","",ten);toast("Đã thêm lịch nhắc “"+ten+"”.");render();
}
async function toggleReminder(id,on){
  const r=(DB.reminders||[]).find(x=>x.id===id);if(!r||r.from!==DB.session)return;
  r.off=!on;
  try{if(MODE==="cloud"){await FB.fs.collection("reminders").doc(id).set(JSON.parse(JSON.stringify(r)))}else save();}catch(e){}
  render();
}
async function delReminder(id){
  const r=(DB.reminders||[]).find(x=>x.id===id);if(!r||r.from!==DB.session)return;
  if(!confirm("Xóa lịch nhắc “"+r.ten+"”?"))return;
  if(MODE==="cloud"){try{await FB.fs.collection("reminders").doc(id).delete()}catch(e){toast("Lỗi: "+e.message);return}}
  DB.reminders=DB.reminders.filter(x=>x.id!==id);if(MODE==="local")save();
  toast("Đã xóa lịch nhắc.");render();
}
/* Gửi nhắc thủ công vào Discord của chính đơn vị (webhook khai trong Sơ đồ tổ chức) */
function pushReminderDiscord(id){
  const r=(DB.reminders||[]).find(x=>x.id===id);if(!r)return;const m=me();
  if(!m.webhook||!/^https:\/\/(discord\.com|discordapp\.com)\/api\/webhooks\//.test(m.webhook)){
    toast("Đơn vị chưa khai Webhook Discord (Sơ đồ tổ chức → Sửa thông tin).");return;}
  const nd=nextDue(r);const diff=Math.round((new Date(nd)-new Date(todayISO()))/86400000);
  const fd=new FormData();
  fd.append("payload_json",JSON.stringify({content:
    "⏰ **Nhắc lịch báo cáo** — "+m.name+"\n📋 "+r.ten+"\n🗓️ Hạn nộp: **"+fmtD(nd)+"** "+(diff===0?"(HÔM NAY)":"(còn "+diff+" ngày)")+
    (r.note?"\nℹ️ "+r.note:"")+"\nĐăng nhập DoanOffice → Mẫu báo cáo để soạn và gửi."}));
  fetch(m.webhook,{method:"POST",body:fd}).then(()=>toast("Đã gửi nhắc vào Discord.")).catch(()=>toast("Không gửi được — kiểm tra webhook."));
}

  <div class="hm-step"><div class="num">2</div><div class="tx">Xóa code mẫu, dán <b>toàn bộ</b> nội dung tệp <b>Code.gs</b> (kèm theo phần mềm) vào.</div></div>

  <h4>Bước 3 — Dán cấu hình (chọn giờ nhắc bên dưới)</h4>
  <p>Chọn giờ theo ý bạn, hệ thống tự sinh đoạn cấu hình. Bấm <b>Sao chép</b> rồi thay phần CONFIG ở đầu Code.gs. Nhớ điền <b>PROJECT_ID</b> và <b>API_KEY</b> lấy ở Bước 1.</p>
  <div style="background:#F6F9FD;border:1px solid var(--line);border-radius:12px;padding:14px;margin:10px 0">
    <div class="form-grid">
      <div class="field"><label>Giờ nhắc lịch báo cáo (dueReminders)</label>
        <select onchange="S.trgConf.due=+this.value;render()">${hourOpts(c.due)}</select></div>
      <div class="field"><label>Giờ nhắc văn bản quá hạn (dailyReminders)</label>
        <select onchange="S.trgConf.daily=+this.value;render()">${hourOpts(c.daily)}</select></div>
    </div>
    <label class="small" style="display:flex;align-items:center;gap:6px;margin:4px 0 8px"><input type="checkbox" ${c.enableWeekly?"checked":""} onchange="S.trgConf.enableWeekly=this.checked;render()"> Bật nhắc báo cáo định kỳ theo tuần (weeklyPeriodic)</label>
    ${c.enableWeekly?`<div class="form-grid">
      <div class="field"><label>Thứ trong tuần</label><select onchange="S.trgConf.weekday=this.value;render()">${weekdayOpts(c.weekday)}</select></div>
      <div class="field"><label>Giờ nhắc định kỳ</label><select onchange="S.trgConf.weekly=+this.value;render()">${hourOpts(c.weekly)}</select></div>
    </div>`:""}
    <div style="position:relative;margin-top:8px">
      <pre id="trg-cfg" style="background:var(--doan-ink);color:#e6edf5;padding:12px 14px;border-radius:9px;overflow:auto;font-size:.76rem;line-height:1.5;margin:0">${esc(cfg)}</pre>
      <button class="btn btn-gold btn-sm" style="position:absolute;top:8px;right:8px" onclick="copyTrgCfg()">⧉ Sao chép</button>
    </div>
  </div>

  <h4>Bước 4 — Chạy thử &amp; cấp quyền</h4>
  <div style="margin:8px 0">${svgStep_runFn("testRun")}</div>
  <p>Chọn hàm <b>testRun</b> ở thanh trên → bấm <b>Run</b>. Google hỏi cấp quyền lần đầu: chọn tài khoản → <b>Advanced</b> → <b>Go to project (unsafe)</b> → <b>Allow</b>. Xem <b>Execution log</b> để chắc đọc được dữ liệu.</p>

  <h4>Bước 5 — Cài lịch tự động chỉ bằng một hàm</h4>
  <div style="margin:8px 0">${svgStep_triggerClock()}</div>
  <p>Thay vì bấm tay từng trigger, chỉ cần: chọn hàm <b>setupTriggers</b> ở thanh trên → bấm <b>Run</b>. Hàm này tự tạo đủ các lịch nhắc theo giờ bạn đã cấu hình ở Bước 3.</p>
  <div class="hm-tip">✅ Xong! Từ nay hệ thống tự nhắc mỗi ngày. Muốn đổi giờ: sửa lại ở Bước 3, dán CONFIG mới, rồi chạy lại <b>setupTriggers</b>. Muốn gỡ: chạy <b>removeTriggers</b>. Muốn kiểm tra: chạy <b>listTriggers</b> rồi xem log.</p></div>
  <div class="hm-tip" style="background:var(--info-bg)">📌 Điều kiện để nhắc tới đúng nơi: mỗi đơn vị phải có <b>Email</b> (nhận nhắc) và/hoặc <b>Webhook Discord</b>. Kiểm tra nhanh đơn vị nào còn thiếu ở <b>Sơ đồ tổ chức → Kiểm tra cấu hình thông báo</b>, bấm ✎ Khai để nhập. <a href="javascript:void(0)" onclick="helpGo('danhba')"><b>→ Mở Sơ đồ tổ chức</b></a></div>

  <h5>Các hàm có sẵn trong Code.gs</h5>
  <ul>
    <li><b>setupTriggers</b> — cài/đặt lại toàn bộ lịch nhắc tự động (chạy 1 lần).</li>
    <li><b>testRun</b> — chạy thử ngay, gửi nhắc luôn để kiểm tra.</li>
    <li><b>removeTriggers</b> — gỡ toàn bộ lịch nhắc.</li>
    <li><b>listTriggers</b> — liệt kê lịch đang đặt.</li>
    <li><b>dueReminders / dailyReminders / weeklyPeriodic</b> — các hàm nhắc (hệ thống tự gọi theo lịch).</li>
  </ul>
  <p class="small muted">Hạn mức miễn phí tài khoản Google thường: 100 email/ngày — đủ cho một huyện/tỉnh đoàn. Không cần thẻ tín dụng, không nâng cấp Firebase.</p>`;
}
function hourOpts(sel){let s="";for(let h=0;h<24;h++){s+=`<option value="${h}" ${h===sel?"selected":""}>${String(h).padStart(2,"0")}:00${h<12?" sáng":h<18?" chiều":" tối"}</option>`}return s}
function weekdayOpts(sel){const d=[["MONDAY","Thứ Hai"],["TUESDAY","Thứ Ba"],["WEDNESDAY","Thứ Tư"],["THURSDAY","Thứ Năm"],["FRIDAY","Thứ Sáu"],["SATURDAY","Thứ Bảy"],["SUNDAY","Chủ Nhật"]];return d.map(x=>`<option value="${x[0]}" ${x[0]===sel?"selected":""}>${x[1]}</option>`).join("")}
function triggerConfigCode(c){
  return `/*===== CONFIG — DoanOffice nhắc tự động =====*/
var PROJECT_ID  = 'doanoffice-xxxxx';   // ← điền projectId Firebase
var API_KEY     = 'AIza...';            // ← điền apiKey Firebase
var ADMIN_EMAIL = '';                   // ← (tùy chọn) email nhận tổng hợp
var LOGIN_DOMAIN = 'doanoffice.local';

var HOUR_DUE_REMINDERS = ${c.due};   // nhắc lịch báo cáo
var HOUR_DAILY         = ${c.daily};   // nhắc văn bản quá hạn
var HOUR_WEEKLY        = ${c.weekly};   // nhắc báo cáo định kỳ
var WEEKLY_DAY         = ScriptApp.WeekDay.${c.weekday};
var ENABLE_WEEKLY      = ${c.enableWeekly};
/*===========================================*/`;
}
function copyTrgCfg(){
  const el=document.getElementById("trg-cfg");if(!el)return;
  const txt=el.textContent;
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(()=>toast("Đã sao chép cấu hình. Dán vào đầu Code.gs.")).catch(()=>fallbackCopy(txt))}
  else fallbackCopy(txt);
}
function fallbackCopy(txt){
  try{const ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="position:fixed;left:-9999px";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);toast("Đã sao chép cấu hình.")}
  catch(e){toast("Không sao chép được — hãy bôi đen và copy thủ công.")}
}
function copyRules(){
  const el=document.getElementById("fs-rules");if(!el)return;const txt=el.textContent;
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(()=>toast("Đã sao chép bộ luật. Dán vào Firebase Console → Rules → Publish.")).catch(()=>fallbackCopy(txt))}
  else fallbackCopy(txt);
}
function helpKhac(){
  return `
  <p class="lead">Các công cụ hỗ trợ tác nghiệp và quản trị hệ thống.</p>
  <h4>Lịch công tác</h4>
  <p>Quản lý sự kiện, hoạt động của đơn vị; hiển thị trực quan theo thời gian.</p>
  <h4>Tìm kiếm toàn văn</h4>
  <p>Tìm nhanh trong toàn bộ văn bản theo số ký hiệu, trích yếu, nội dung.</p>
  <h4>Kho tài liệu</h4>
  <p>Lưu và chia sẻ tài liệu dùng chung (biểu mẫu, bộ nhận diện, hướng dẫn…) cho các đơn vị trong nhánh.</p>
  <h4>Sơ đồ tổ chức</h4>
  <p>Xem và quản lý cây đơn vị. Trong <b>Sửa thông tin đơn vị</b> có thể khai <b>Webhook Discord</b> (để nhận thông báo tức thời) và <b>Email</b> (để nhận nhắc việc tự động). Webhook chỉ gửi được, không đọc dữ liệu nên an toàn.</p>
  <p>Thẻ <b>Kiểm tra cấu hình thông báo</b> (ngay trong Sơ đồ tổ chức) hiển thị đơn vị nào trong nhánh đã/chưa khai đủ email và webhook, kèm nút <b>✎ Khai</b> để nhập nhanh. Đây là cách dễ nhất để đảm bảo thông báo tự động phủ khắp các đơn vị — không cần mở Firestore kiểm tra tay.</p>
  <h4>Dữ liệu &amp; sao lưu (Quản trị)</h4>
  <p>Thiết lập chế độ đồng bộ Firestore, sao lưu/khôi phục dữ liệu, và xem các quy tắc bảo mật cần bổ sung. Đây cũng là nơi hướng dẫn cấu hình Code.gs cho thông báo Email/Discord tự động.</p>
  <h4>Thông báo Discord &amp; Email</h4>
  <div class="hm-step"><div class="num">1</div><div class="tx">Trong máy chủ Discord của đơn vị: Cài đặt kênh → Tích hợp → Webhook → New Webhook → Copy URL.</div></div>
  <div class="hm-step"><div class="num">2</div><div class="tx">Dán URL vào <b>Sơ đồ tổ chức → Sửa thông tin đơn vị → Webhook Discord</b>.</div></div>
  <div class="hm-step"><div class="num">3</div><div class="tx">Từ đó, mỗi khi có văn bản phát hành/chuyển tiếp hoặc phát động báo cáo, kênh Discord nhận thông báo ngay.</div></div>
  <p style="margin-top:12px"><a href="javascript:void(0)" onclick="helpGo('danhba')"><b>→ Mở Sơ đồ tổ chức</b></a> · <a href="javascript:void(0)" onclick="helpGo('hethong')"><b>Mở Dữ liệu &amp; sao lưu</b></a></p>`;
}
function helpFaq(){
  const faqs=[
    ["Dữ liệu của tôi lưu ở đâu, có an toàn không?","Ở chế độ cục bộ, dữ liệu lưu trong trình duyệt máy bạn. Ở chế độ đồng bộ, dữ liệu lưu trên Firestore của đơn vị và chia sẻ theo cây tổ chức với quy tắc bảo mật rõ ràng. Webhook Discord chỉ gửi được, không đọc được dữ liệu."],
    ["Tôi không phải Bí thư, có phát hành văn bản/báo cáo được không?","Bạn vẫn soạn được, nhưng văn bản/báo cáo sẽ ở trạng thái chờ duyệt để Bí thư/Phó Bí thư phê duyệt phát hành — đúng quy trình văn thư."],
    ["Quý và năm có phải nhập số liệu lại không?","Không. Nếu dùng \"Chương trình cả năm\", bạn chỉ nhập số theo tháng; quý tự cộng từ 3 tháng và năm tự cộng từ 4 quý theo cách gộp của từng chỉ tiêu."],
    ["Vì sao có chỉ tiêu cộng dồn, có chỉ tiêu lại lấy số cuối kỳ?","Chỉ tiêu \"phát sinh trong kỳ\" (kết nạp mới, số buổi…) thì cộng dồn (sum). Chỉ tiêu \"tổng/hiện có\" (tổng số đoàn viên…) thì lấy giá trị kỳ cuối (last) để không bị cộng trùng."],
    ["Làm sao để được nhắc hạn khi không ai mở phần mềm?","Cấu hình tệp Code.gs trên Google Apps Script và đặt lịch trigger. Hệ thống sẽ gửi Email/Discord tự động hằng ngày. Xem Dữ liệu & sao lưu để biết chi tiết."],
    ["Báo cáo xuất ra có đúng thể thức văn bản của Đoàn không?","Có. Bản Word gồm quốc hiệu, tên cơ quan, số ký hiệu, địa danh–ngày tháng, tên báo cáo, nơi nhận và phần ký (TM. BAN CHẤP HÀNH – BÍ THƯ) theo đúng thể thức."],
    ["Có tốn phí không?","Không. Phần mềm, Firebase gói Spark, Discord webhook và Google Apps Script đều nằm trong hạn mức miễn phí."],
  ];
  return `<p class="lead">Những câu hỏi thường gặp khi sử dụng DoanOffice.</p>
    ${faqs.map(f=>`<div class="hm-faq"><b>${esc(f[0])}</b><span>${esc(f[1])}</span></div>`).join("")}
    <p style="margin-top:14px">Chưa tìm thấy câu trả lời? Liên hệ quản trị hệ thống của đơn vị hoặc xem mục <b>Dữ liệu &amp; sao lưu</b> để biết thông tin cấu hình.</p>`;
}

/* ---------- Lớp tích hợp mở (Open Integration Layer) ----------
   Các hệ thống khác / connector tương lai (iOffice tỉnh, Zalo bot…)
   truy cập qua window.DoanOffice — không đụng vào lõi. */
window.DoanOffice={
  version:"4.0",
  unit:()=>DB&&DB.session?{...me()}:null,
  docs:()=>DB?JSON.parse(JSON.stringify(searchCorpus())):[],
  targets:()=>DB?JSON.parse(JSON.stringify([...myTargets(),...myAssignedTargets()])):[],
  periodic:()=>DB?JSON.parse(JSON.stringify([...periodicMine(),...periodicAssigned()])):[],
  reportTemplates:()=>DB?JSON.parse(JSON.stringify(allTemplates())):[],
  reminders:()=>DB?JSON.parse(JSON.stringify(reminderList().map(r=>({...r,next:nextDue(r)})))):[],
  dueReminders:()=>DB?JSON.parse(JSON.stringify(reminderList().filter(r=>!r.off).map(r=>{const nd=nextDue(r);const diff=Math.round((new Date(nd)-new Date(todayISO()))/86400000);return{ten:r.ten,due:nd,daysLeft:diff,within:diff>=0&&diff<=(r.lead||2)}}).filter(x=>x.within))):[],
  overdueInbox:()=>DB?myInbox().filter(d=>dstat(d)==="phathanh"&&d.hanXuLy&&d.hanXuLy<todayISO()&&(myRecip(d)||{}).status!=="daxuly").map(d=>({so:d.so,trichYeu:d.trichYeu,han:d.hanXuLy})):[],
  openDoc:(id)=>openDoc(id),
  exportAll:()=>backupJSON()
};
/* ---------- init ---------- */
try{const h=(location.hash||"").match(/#vb=([A-Za-z0-9]+)/);if(h)S.pendingDoc=h[1]}catch(e){}
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&S.help){S.help=null;render()}});
boot();
</script>
